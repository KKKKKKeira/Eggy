<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EGGY 光源統一機</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
/* ── THEME: Warm Editorial（沿用 Eggy 配色） ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #F4EDE4; color: #1C1410; line-height: 1.6;
}
.app-container { max-width: 1200px; margin: 0 auto; padding: 20px; }
h1 { font-family: 'Playfair Display', Georgia, serif; font-size: 2rem; font-weight: 800; }
h2 { font-family: 'Playfair Display', Georgia, serif; font-size: 1.2rem; font-weight: 700; margin-bottom: 12px; }
.subtitle { color: #7A5C50; font-size: 0.9rem; margin-top: 4px; margin-bottom: 16px; }

.section {
  background: #FBF8F5; border-radius: 12px; padding: 24px;
  margin-bottom: 20px; box-shadow: 0 1px 6px rgba(28,20,16,0.06);
  border: 1px solid #EDE0D6;
}

label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 4px; color: #3D2B23; }
input[type="text"], input[type="password"], textarea, select {
  width: 100%; padding: 10px 12px; border: 1.5px solid #E5D5C8; border-radius: 8px;
  font-size: 0.95rem; font-family: inherit; background: #FBF8F5; color: #1C1410;
}
input:focus, textarea:focus, select:focus {
  outline: none; border-color: #A81C2B;
  box-shadow: 0 0 0 3px rgba(168,28,43,0.1);
}
textarea { resize: vertical; }
.field-hint { font-size: 0.78rem; color: #9A7F76; margin-top: 4px; }

.btn {
  display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px;
  border: 1.5px solid transparent; border-radius: 8px; font-size: 0.95rem; font-weight: 600;
  cursor: pointer; transition: all 0.2s; font-family: inherit;
}
.btn-primary { background: #A81C2B; color: #fff; border-color: #A81C2B; }
.btn-primary:hover { background: #8B1522; border-color: #8B1522; }
.btn-primary:disabled { background: #D4899A; border-color: #D4899A; cursor: not-allowed; }
.btn-secondary { background: #FBF8F5; color: #1C1410; border-color: #D5C5BC; }
.btn-secondary:hover { background: #F4EDE4; border-color: #A81C2B; color: #A81C2B; }
.btn-danger { background: #FDF0F1; color: #A81C2B; border-color: #E5C5CA; }
.btn-danger:hover { background: #FADEDF; }
.btn-small { padding: 6px 12px; font-size: 0.82rem; }
.btn-large { padding: 14px 32px; font-size: 1.05rem; letter-spacing: 0.02em; }

/* API Key */
.api-key-bar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.api-key-input-wrap { position: relative; flex: 1; min-width: 250px; }
.api-key-input-wrap input { padding-right: 40px; }
.eye-toggle {
  position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
  background: none; border: none; cursor: pointer; font-size: 1.1rem; color: #9A7F76;
}
.status-saved { color: #2D6A35; font-size: 0.85rem; font-weight: 600; }
.api-hint { font-size: 0.8rem; color: #9A7F76; margin-top: 8px; }
.api-hint a { color: #A81C2B; text-decoration: none; }

/* Tabs */
.tabs { display: flex; gap: 8px; border-bottom: 2px solid #EDE0D6; margin-bottom: 20px; }
.tab {
  padding: 12px 20px; cursor: pointer; font-weight: 600; color: #7A5C50;
  border-bottom: 3px solid transparent; margin-bottom: -2px; font-size: 0.95rem;
}
.tab.active { color: #A81C2B; border-bottom-color: #A81C2B; }
.tab:hover { color: #A81C2B; }

/* Drop zone */
.drop-zone {
  border: 2px dashed #D5C5BC; border-radius: 12px; padding: 32px;
  text-align: center; cursor: pointer; transition: all 0.2s; background: #FBF8F5;
}
.drop-zone:hover, .drop-zone.dragging {
  border-color: #A81C2B; background: #FDF0F1;
}
.drop-zone p { color: #7A5C50; }
.drop-zone strong { color: #A81C2B; }

/* Image grid */
.img-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 16px; margin-top: 16px;
}
.img-card {
  background: #FBF8F5; border: 2px solid #EDE0D6; border-radius: 10px;
  overflow: hidden; position: relative; transition: all 0.2s;
}
.img-card.reference { border-color: #A81C2B; box-shadow: 0 0 0 3px rgba(168,28,43,0.15); }
.img-card img { width: 100%; height: 160px; object-fit: cover; display: block; background: #F4EDE4; }
.img-card-body { padding: 8px 10px; }
.img-card-name { font-size: 0.78rem; color: #3D2B23; word-break: break-all; margin-bottom: 6px; line-height: 1.3; }
.img-card-actions { display: flex; gap: 4px; flex-wrap: wrap; }
.img-card-actions .btn-small { flex: 1; }
.ref-badge {
  position: absolute; top: 8px; left: 8px; background: #A81C2B; color: #fff;
  padding: 3px 10px; border-radius: 999px; font-size: 0.72rem; font-weight: 700;
  letter-spacing: 0.05em;
}
.status-pill {
  position: absolute; top: 8px; right: 8px; padding: 3px 8px; border-radius: 999px;
  font-size: 0.7rem; font-weight: 700; backdrop-filter: blur(4px);
}
.status-pill.pending { background: rgba(154,127,118,0.85); color: #fff; }
.status-pill.processing { background: rgba(184,92,0,0.9); color: #fff; }
.status-pill.done { background: rgba(45,106,53,0.9); color: #fff; }
.status-pill.error { background: rgba(168,28,43,0.9); color: #fff; }

/* Result comparison */
.compare-row {
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  margin-bottom: 16px; padding: 12px; background: #F4EDE4; border-radius: 10px;
}
.compare-col { text-align: center; }
.compare-col img { width: 100%; max-height: 280px; object-fit: contain; border-radius: 8px; background: #fff; }
.compare-label { font-size: 0.8rem; color: #7A5C50; font-weight: 600; margin-bottom: 6px; }

/* Prompt result */
.prompt-card {
  background: #FBF8F5; border: 1px solid #EDE0D6; border-radius: 10px;
  padding: 16px; margin-bottom: 14px;
}
.prompt-card-header { display: flex; gap: 12px; align-items: center; margin-bottom: 10px; }
.prompt-card-thumb { width: 80px; height: 80px; object-fit: cover; border-radius: 6px; flex-shrink: 0; }
.prompt-card-name { font-size: 0.85rem; font-weight: 600; color: #3D2B23; word-break: break-all; }
.prompt-text {
  background: #fff; border: 1px solid #EDE0D6; border-radius: 6px;
  padding: 10px 12px; font-size: 0.88rem; line-height: 1.6; color: #1C1410;
  white-space: pre-wrap; word-break: break-word; max-height: 240px; overflow-y: auto;
}
.prompt-actions { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }

/* Misc */
.bar { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-top: 16px; }
.spacer { flex: 1; }
.spinner {
  width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.4);
  border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: #1C1410; color: #fff; padding: 10px 18px; border-radius: 8px;
  font-size: 0.88rem; z-index: 1000; box-shadow: 0 4px 16px rgba(0,0,0,0.2);
}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const IMAGE_MODEL = 'gemini-2.5-flash-image';
const TEXT_MODEL = 'gemini-2.5-flash';

// ===== Helpers =====
function readFileAsDataURL(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

function dataURLtoBase64(dataURL) {
  return dataURL.split(',')[1];
}

function uid() {
  return Math.random().toString(36).slice(2, 10);
}

function downloadBase64(base64, filename, mime = 'image/png') {
  const a = document.createElement('a');
  a.href = `data:${mime};base64,${base64}`;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

// ===== Gemini API =====
async function callGeminiImage(apiKey, parts) {
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${IMAGE_MODEL}:generateContent`;
  const body = {
    contents: [{ parts }],
    generationConfig: { responseModalities: ['TEXT', 'IMAGE'] }
  };
  const delays = [3000, 6000, 10000, 15000, 20000];
  let lastError;
  for (let attempt = 0; attempt <= delays.length; attempt++) {
    if (attempt > 0) await new Promise(r => setTimeout(r, delays[attempt - 1]));
    try {
      const resp = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-goog-api-key': apiKey },
        body: JSON.stringify(body)
      });
      if (resp.status === 429) throw new Error('額度已用完或請求過於頻繁');
      if (resp.status === 401 || resp.status === 403) throw new Error('API Key 無效或沒有權限');
      if (resp.status >= 500) { lastError = new Error(`伺服器錯誤 ${resp.status}`); continue; }
      if (!resp.ok) {
        const t = await resp.text().catch(() => '');
        throw new Error(`API ${resp.status}: ${t.slice(0, 200)}`);
      }
      const data = await resp.json();
      const cand = data.candidates && data.candidates[0];
      if (!cand) throw new Error('沒有回傳結果');
      const imgPart = cand.content.parts.find(p => p.inlineData);
      if (!imgPart) throw new Error('回傳沒有圖片（可能被安全過濾擋下）');
      return imgPart.inlineData.data;
    } catch (err) {
      const msg = err.message || '';
      if (msg.includes('API Key') || msg.includes('額度') || msg.startsWith('API ') || msg.includes('沒有') || msg.includes('安全')) throw err;
      lastError = err;
    }
  }
  throw lastError || new Error('多次重試後仍失敗');
}

async function callGeminiText(apiKey, parts) {
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${TEXT_MODEL}:generateContent`;
  const body = { contents: [{ parts }] };
  const delays = [2000, 5000, 10000, 15000];
  let lastError;
  for (let attempt = 0; attempt <= delays.length; attempt++) {
    if (attempt > 0) await new Promise(r => setTimeout(r, delays[attempt - 1]));
    try {
      const resp = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-goog-api-key': apiKey },
        body: JSON.stringify(body)
      });
      if (resp.status === 429) throw new Error('額度已用完或請求過於頻繁');
      if (resp.status === 401 || resp.status === 403) throw new Error('API Key 無效或沒有權限');
      if (resp.status >= 500) { lastError = new Error(`伺服器錯誤 ${resp.status}`); continue; }
      if (!resp.ok) {
        const t = await resp.text().catch(() => '');
        throw new Error(`API ${resp.status}: ${t.slice(0, 200)}`);
      }
      const data = await resp.json();
      const cand = data.candidates && data.candidates[0];
      if (!cand) throw new Error('沒有回傳結果');
      const textPart = cand.content.parts.find(p => p.text);
      if (!textPart) throw new Error('回傳沒有文字');
      return textPart.text.trim();
    } catch (err) {
      const msg = err.message || '';
      if (msg.includes('API Key') || msg.includes('額度') || msg.startsWith('API ') || msg.includes('沒有')) throw err;
      lastError = err;
    }
  }
  throw lastError || new Error('多次重試後仍失敗');
}

// ===== API Key Section =====
function ApiKeySection({ apiKey, setApiKey }) {
  const [show, setShow] = useState(false);
  const [editing, setEditing] = useState(!apiKey);
  const inputRef = useRef(null);

  const save = () => {
    const v = inputRef.current.value.trim();
    if (!v) return;
    localStorage.setItem('gemini_api_key', v);
    setApiKey(v);
    setEditing(false);
  };
  const clear = () => {
    localStorage.removeItem('gemini_api_key');
    setApiKey('');
    setEditing(true);
  };

  return (
    <div className="section">
      <h2>Gemini API Key</h2>
      {editing ? (
        <div className="api-key-bar">
          <div className="api-key-input-wrap">
            <input
              ref={inputRef}
              type={show ? 'text' : 'password'}
              placeholder="貼上你的 Gemini API Key"
              defaultValue={apiKey}
              onKeyDown={e => e.key === 'Enter' && save()}
            />
            <button className="eye-toggle" onClick={() => setShow(!show)}>{show ? '🙈' : '👁'}</button>
          </div>
          <button className="btn btn-primary btn-small" onClick={save}>儲存</button>
        </div>
      ) : (
        <div className="api-key-bar">
          <span className="status-saved">✓ 已儲存（瀏覽器本機）</span>
          <button className="btn btn-secondary btn-small" onClick={() => setEditing(true)}>更換</button>
          <button className="btn btn-danger btn-small" onClick={clear}>清除</button>
        </div>
      )}
      <div className="api-hint">
        在 <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener">Google AI Studio</a> 申請；只儲存在你的瀏覽器中，不會上傳。
      </div>
    </div>
  );
}

// ===== Drop Zone =====
function DropZone({ onFiles, multiple = true, hint = '點擊或拖曳照片到這裡（可一次多張）' }) {
  const [dragging, setDragging] = useState(false);
  const inputRef = useRef(null);

  const handleFiles = (fileList) => {
    const files = Array.from(fileList).filter(f => f.type.startsWith('image/'));
    if (files.length) onFiles(files);
  };

  return (
    <>
      <div
        className={`drop-zone ${dragging ? 'dragging' : ''}`}
        onClick={() => inputRef.current.click()}
        onDragOver={e => { e.preventDefault(); setDragging(true); }}
        onDragLeave={() => setDragging(false)}
        onDrop={e => { e.preventDefault(); setDragging(false); handleFiles(e.dataTransfer.files); }}
      >
        <p><strong>＋</strong> {hint}</p>
      </div>
      <input
        ref={inputRef}
        type="file"
        accept="image/*"
        multiple={multiple}
        style={{ display: 'none' }}
        onChange={e => { handleFiles(e.target.files); e.target.value = ''; }}
      />
    </>
  );
}

// ===== Tab 1: Light Harmony =====
function LightHarmonyTab({ apiKey, showToast }) {
  // photo: { id, name, mime, dataURL, base64, status, resultBase64?, error? }
  const [photos, setPhotos] = useState([]);
  const [referenceId, setReferenceId] = useState(null);
  const [extraInstruction, setExtraInstruction] = useState('');
  const [running, setRunning] = useState(false);

  const addFiles = async (files) => {
    const items = await Promise.all(files.map(async f => {
      const dataURL = await readFileAsDataURL(f);
      return {
        id: uid(),
        name: f.name,
        mime: f.type || 'image/png',
        dataURL,
        base64: dataURLtoBase64(dataURL),
        status: 'pending',
      };
    }));
    setPhotos(prev => {
      const next = [...prev, ...items];
      return next;
    });
    if (!referenceId && items.length > 0) {
      setReferenceId(items[0].id);
    }
  };

  const removePhoto = (id) => {
    setPhotos(prev => prev.filter(p => p.id !== id));
    if (referenceId === id) {
      setReferenceId(prev => {
        const remaining = photos.filter(p => p.id !== id);
        return remaining.length ? remaining[0].id : null;
      });
    }
  };

  const reference = photos.find(p => p.id === referenceId);
  const targets = photos.filter(p => p.id !== referenceId);

  const buildPrompt = () => {
    let p = `你會收到兩張圖片。第一張是「光源／色調楷模」，第二張是「需要調整的目標圖」。
請輸出一張新圖片：完全保留第二張（目標圖）的構圖、人物、物件、姿勢、表情、背景元素與細節，**只**將整張圖的光源方向、色溫、白平衡、明暗對比、氛圍光調整到與第一張（楷模）一致。
不要更動主體形狀、不要改變人臉特徵、不要重新生成內容、不要加入新元素。輸出與目標圖相同的構圖與長寬比例。`;
    if (extraInstruction.trim()) {
      p += `\n額外指示：${extraInstruction.trim()}`;
    }
    return p;
  };

  const updatePhoto = (id, patch) => {
    setPhotos(prev => prev.map(p => p.id === id ? { ...p, ...patch } : p));
  };

  const runHarmonize = async () => {
    if (!apiKey) return showToast('請先設定 API Key');
    if (!reference) return showToast('請先指定一張楷模圖');
    if (targets.length === 0) return showToast('至少需要一張目標圖');
    setRunning(true);
    const prompt = buildPrompt();
    for (const t of targets) {
      updatePhoto(t.id, { status: 'processing', error: null });
      try {
        const parts = [
          { inlineData: { mimeType: reference.mime, data: reference.base64 } },
          { text: '↑ 這是「光源／色調楷模」（保留它的光線氛圍）' },
          { inlineData: { mimeType: t.mime, data: t.base64 } },
          { text: '↑ 這是「目標圖」（保留它的內容構圖）' },
          { text: prompt }
        ];
        const result = await callGeminiImage(apiKey, parts);
        updatePhoto(t.id, { status: 'done', resultBase64: result });
      } catch (err) {
        updatePhoto(t.id, { status: 'error', error: err.message || '未知錯誤' });
      }
    }
    setRunning(false);
  };

  const runOne = async (id) => {
    if (!apiKey) return showToast('請先設定 API Key');
    if (!reference) return showToast('請先指定一張楷模圖');
    const t = photos.find(p => p.id === id);
    if (!t) return;
    updatePhoto(id, { status: 'processing', error: null });
    try {
      const parts = [
        { inlineData: { mimeType: reference.mime, data: reference.base64 } },
        { text: '↑ 這是「光源／色調楷模」' },
        { inlineData: { mimeType: t.mime, data: t.base64 } },
        { text: '↑ 這是「目標圖」' },
        { text: buildPrompt() }
      ];
      const result = await callGeminiImage(apiKey, parts);
      updatePhoto(id, { status: 'done', resultBase64: result });
    } catch (err) {
      updatePhoto(id, { status: 'error', error: err.message || '未知錯誤' });
    }
  };

  const downloadAll = async () => {
    const done = photos.filter(p => p.status === 'done' && p.resultBase64);
    if (done.length === 0) return showToast('還沒有完成的結果');
    const zip = new JSZip();
    done.forEach(p => {
      const baseName = p.name.replace(/\.[^.]+$/, '');
      zip.file(`harmonized_${baseName}.png`, p.resultBase64, { base64: true });
    });
    const blob = await zip.generateAsync({ type: 'blob' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'harmonized_photos.zip';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  const clearAll = () => {
    if (!confirm('清空所有照片？')) return;
    setPhotos([]); setReferenceId(null);
  };

  return (
    <>
      <div className="section">
        <h2>1. 上傳要統一光源的照片</h2>
        <p className="subtitle">先放楷模圖、再放需要調整的圖。也可以拖曳多張一次上傳。</p>
        <DropZone onFiles={addFiles} />
        {photos.length > 0 && (
          <>
            <div className="bar">
              <strong>共 {photos.length} 張</strong>
              <span className="spacer" />
              <button className="btn btn-danger btn-small" onClick={clearAll}>清空</button>
            </div>
            <div className="img-grid">
              {photos.map(p => (
                <div key={p.id} className={`img-card ${p.id === referenceId ? 'reference' : ''}`}>
                  <img src={p.dataURL} alt={p.name} />
                  {p.id === referenceId && <span className="ref-badge">楷模</span>}
                  {p.id !== referenceId && p.status !== 'pending' && (
                    <span className={`status-pill ${p.status}`}>
                      {p.status === 'processing' ? '處理中' : p.status === 'done' ? '完成' : p.status === 'error' ? '失敗' : ''}
                    </span>
                  )}
                  <div className="img-card-body">
                    <div className="img-card-name">{p.name}</div>
                    <div className="img-card-actions">
                      {p.id !== referenceId && (
                        <button className="btn btn-secondary btn-small" onClick={() => setReferenceId(p.id)}>設為楷模</button>
                      )}
                      <button className="btn btn-danger btn-small" onClick={() => removePhoto(p.id)}>移除</button>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </>
        )}
      </div>

      <div className="section">
        <h2>2. 額外指示（可留空）</h2>
        <textarea
          rows={3}
          placeholder="例如：偏向暖色黃昏、保留人物膚色不要過度泛黃、輕微提高陰影細節 …"
          value={extraInstruction}
          onChange={e => setExtraInstruction(e.target.value)}
        />
        <div className="field-hint">這段文字會附加到統一光源的指令裡。</div>
      </div>

      <div className="section">
        <h2>3. 開始統一光源</h2>
        <div className="bar">
          <button
            className="btn btn-primary btn-large"
            onClick={runHarmonize}
            disabled={running || !apiKey || !reference || targets.length === 0}
          >
            {running ? <><span className="spinner" /> 處理中…</> : '🎨 統一所有照片光源'}
          </button>
          <button className="btn btn-secondary" onClick={downloadAll} disabled={running}>
            ⬇ 下載全部結果（.zip）
          </button>
        </div>

        {targets.some(t => t.resultBase64) && (
          <div style={{ marginTop: 24 }}>
            <h2 style={{ marginBottom: 12 }}>對比結果</h2>
            {targets.filter(t => t.resultBase64 || t.status === 'error').map(t => (
              <div key={t.id} className="compare-row">
                <div className="compare-col">
                  <div className="compare-label">原圖：{t.name}</div>
                  <img src={t.dataURL} alt="原圖" />
                </div>
                <div className="compare-col">
                  <div className="compare-label">
                    {t.status === 'error' ? `失敗：${t.error}` : '統一後'}
                  </div>
                  {t.resultBase64 ? (
                    <>
                      <img src={`data:image/png;base64,${t.resultBase64}`} alt="結果" />
                      <div style={{ marginTop: 8, display: 'flex', gap: 8, justifyContent: 'center' }}>
                        <button
                          className="btn btn-secondary btn-small"
                          onClick={() => downloadBase64(t.resultBase64, `harmonized_${t.name.replace(/\.[^.]+$/, '')}.png`)}
                        >下載</button>
                        <button
                          className="btn btn-secondary btn-small"
                          onClick={() => runOne(t.id)}
                          disabled={running}
                        >重做</button>
                      </div>
                    </>
                  ) : (
                    <button
                      className="btn btn-secondary btn-small"
                      onClick={() => runOne(t.id)}
                      disabled={running}
                    >重試</button>
                  )}
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    </>
  );
}

// ===== Tab 2: Prompt Generator =====
function PromptGeneratorTab({ apiKey, showToast }) {
  const [photos, setPhotos] = useState([]); // { id, name, mime, dataURL, base64, status, prompt?, error? }
  const [running, setRunning] = useState(false);
  const [language, setLanguage] = useState('en');
  const [length, setLength] = useState('medium');
  const [extraGuidance, setExtraGuidance] = useState('');

  const addFiles = async (files) => {
    const items = await Promise.all(files.map(async f => {
      const dataURL = await readFileAsDataURL(f);
      return {
        id: uid(), name: f.name, mime: f.type || 'image/png',
        dataURL, base64: dataURLtoBase64(dataURL), status: 'pending'
      };
    }));
    setPhotos(prev => [...prev, ...items]);
  };

  const removePhoto = (id) => setPhotos(prev => prev.filter(p => p.id !== id));
  const updatePhoto = (id, patch) => setPhotos(prev => prev.map(p => p.id === id ? { ...p, ...patch } : p));

  const lengthHint = {
    short: '一段約 60–100 字',
    medium: '一段約 120–200 字',
    long: '一段約 220–350 字'
  }[length];

  const langHint = language === 'en' ? '使用「英文」輸出整段 prompt' : '使用「繁體中文」輸出整段 prompt';

  const buildInstruction = () => {
    return `你是一個圖像描述助理，任務是看圖後產生一段可直接餵給 AI 圖像生成器的 prompt。

**嚴格規則（避免侵權，務必遵守）：**
1. 絕對不可以提及任何專有名詞，包括但不限於：
   - 真實人名、藝人、政治人物、歷史人物
   - 卡通／動漫／電影／遊戲角色名（皮卡丘、米奇、瑪利歐、哈利波特等一律不行）
   - 任何品牌、商標、商品名稱（Nike、Coca-Cola、iPhone、星巴克等）
   - 任何畫家／攝影師／導演名字、特定畫派或作品名稱（如 "in the style of XXX"）
   - 城市名、知名地標名稱、國家名（巴黎鐵塔、東京塔、自由女神 → 應改為「歐式鐵製觀景塔」「具有古典造型的銅製女性雕像」這類描述）
   - 任何商業字體名、軟體名、攝影器材型號
2. 用通用、描述性的詞彙替代專有名詞，例如：
   - 不寫「迪士尼風格」→ 寫「圓潤可愛的卡通風格、大眼睛、柔和色彩」
   - 不寫「吉卜力」→ 寫「手繪日式動畫感、柔和水彩光線、細膩自然背景」
   - 不寫「賽博龐克」是常見詞，可以保留，但不要寫「銀翼殺手」
3. 描述要具體：主體（外觀、年齡感、表情、姿勢、服裝材質與顏色）、構圖（鏡頭距離、視角、景別）、光線（方向、色溫、強弱、陰影特性）、色彩（調性、對比、飽和度）、環境（地點氛圍、時間、天氣、空間元素）、氛圍（情緒）、媒材／風格（攝影／插畫／3D／油畫感等）、品質詞。
4. 輸出**單一段落**純文字 prompt，${lengthHint}，${langHint}。
5. 不要加標題、不要編號、不要引號、不要 markdown，只輸出 prompt 本身那一段文字。

${extraGuidance.trim() ? '額外要求：' + extraGuidance.trim() : ''}`;
  };

  const runOne = async (id) => {
    if (!apiKey) return showToast('請先設定 API Key');
    const p = photos.find(x => x.id === id);
    if (!p) return;
    updatePhoto(id, { status: 'processing', error: null });
    try {
      const parts = [
        { inlineData: { mimeType: p.mime, data: p.base64 } },
        { text: buildInstruction() }
      ];
      const text = await callGeminiText(apiKey, parts);
      updatePhoto(id, { status: 'done', prompt: text });
    } catch (err) {
      updatePhoto(id, { status: 'error', error: err.message || '未知錯誤' });
    }
  };

  const runAll = async () => {
    if (!apiKey) return showToast('請先設定 API Key');
    if (photos.length === 0) return showToast('請先上傳圖片');
    setRunning(true);
    const instruction = buildInstruction();
    for (const p of photos) {
      if (p.status === 'done') continue;
      updatePhoto(p.id, { status: 'processing', error: null });
      try {
        const parts = [
          { inlineData: { mimeType: p.mime, data: p.base64 } },
          { text: instruction }
        ];
        const text = await callGeminiText(apiKey, parts);
        updatePhoto(p.id, { status: 'done', prompt: text });
      } catch (err) {
        updatePhoto(p.id, { status: 'error', error: err.message || '未知錯誤' });
      }
    }
    setRunning(false);
  };

  const copyText = (text) => {
    navigator.clipboard.writeText(text).then(
      () => showToast('已複製到剪貼簿'),
      () => showToast('複製失敗')
    );
  };

  const exportAll = () => {
    const done = photos.filter(p => p.status === 'done' && p.prompt);
    if (done.length === 0) return showToast('還沒有完成的 prompt');
    const text = done.map(p => `=== ${p.name} ===\n${p.prompt}\n`).join('\n');
    const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'image_prompts.txt';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
  };

  const clearAll = () => {
    if (!confirm('清空所有圖片與 prompt？')) return;
    setPhotos([]);
  };

  return (
    <>
      <div className="section">
        <h2>1. 上傳要產生 prompt 的圖片</h2>
        <DropZone onFiles={addFiles} />
        {photos.length > 0 && (
          <div className="bar">
            <strong>共 {photos.length} 張</strong>
            <span className="spacer" />
            <button className="btn btn-danger btn-small" onClick={clearAll}>清空</button>
          </div>
        )}
      </div>

      <div className="section">
        <h2>2. 輸出設定</h2>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16, marginBottom: 14 }}>
          <div>
            <label>語言</label>
            <select value={language} onChange={e => setLanguage(e.target.value)}>
              <option value="en">英文（建議，AI 圖像模型多以英文訓練）</option>
              <option value="zh">繁體中文</option>
            </select>
          </div>
          <div>
            <label>長度</label>
            <select value={length} onChange={e => setLength(e.target.value)}>
              <option value="short">短（60–100 字）</option>
              <option value="medium">中（120–200 字）</option>
              <option value="long">長（220–350 字）</option>
            </select>
          </div>
        </div>
        <label>額外要求（可留空）</label>
        <textarea
          rows={2}
          placeholder="例如：偏電影感、加強情緒描述、不要寫人物年紀 …"
          value={extraGuidance}
          onChange={e => setExtraGuidance(e.target.value)}
        />
        <div className="field-hint">系統會自動排除真人姓名、卡通／品牌／地標等專有名詞，改用一般描述詞。</div>
      </div>

      <div className="section">
        <h2>3. 產生 Prompt</h2>
        <div className="bar">
          <button
            className="btn btn-primary btn-large"
            onClick={runAll}
            disabled={running || !apiKey || photos.length === 0}
          >
            {running ? <><span className="spinner" /> 產生中…</> : '✍️ 為所有圖片產生 Prompt'}
          </button>
          <button className="btn btn-secondary" onClick={exportAll} disabled={running}>
            ⬇ 匯出全部（.txt）
          </button>
        </div>

        {photos.length > 0 && (
          <div style={{ marginTop: 20 }}>
            {photos.map(p => (
              <div key={p.id} className="prompt-card">
                <div className="prompt-card-header">
                  <img className="prompt-card-thumb" src={p.dataURL} alt={p.name} />
                  <div style={{ flex: 1 }}>
                    <div className="prompt-card-name">{p.name}</div>
                    <div style={{ fontSize: '0.78rem', color: '#9A7F76', marginTop: 4 }}>
                      {p.status === 'pending' && '尚未產生'}
                      {p.status === 'processing' && '產生中…'}
                      {p.status === 'done' && '✓ 完成'}
                      {p.status === 'error' && `失敗：${p.error}`}
                    </div>
                  </div>
                  <button className="btn btn-danger btn-small" onClick={() => removePhoto(p.id)}>移除</button>
                </div>
                {p.prompt && (
                  <>
                    <div className="prompt-text">{p.prompt}</div>
                    <div className="prompt-actions">
                      <button className="btn btn-secondary btn-small" onClick={() => copyText(p.prompt)}>📋 複製</button>
                      <button className="btn btn-secondary btn-small" onClick={() => runOne(p.id)} disabled={running}>🔄 重做</button>
                    </div>
                  </>
                )}
                {!p.prompt && (
                  <div className="prompt-actions">
                    <button className="btn btn-secondary btn-small" onClick={() => runOne(p.id)} disabled={running}>單張產生</button>
                  </div>
                )}
              </div>
            ))}
          </div>
        )}
      </div>
    </>
  );
}

// ===== App =====
function App() {
  const [apiKey, setApiKey] = useState(() => localStorage.getItem('gemini_api_key') || '');
  const [tab, setTab] = useState('harmony');
  const [toast, setToast] = useState(null);

  const showToast = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(null), 2400);
  };

  return (
    <div className="app-container">
      <div style={{ marginBottom: 20 }}>
        <h1>🥚 EGGY 光源統一機</h1>
        <div className="subtitle">把多張不同色調光源的照片，統一到同一個楷模光源；並可為任何照片生成不含專有名詞的圖像 prompt。</div>
      </div>

      <ApiKeySection apiKey={apiKey} setApiKey={setApiKey} />

      <div className="tabs">
        <div className={`tab ${tab === 'harmony' ? 'active' : ''}`} onClick={() => setTab('harmony')}>
          🎨 統一光源
        </div>
        <div className={`tab ${tab === 'prompt' ? 'active' : ''}`} onClick={() => setTab('prompt')}>
          ✍️ 圖片轉 Prompt
        </div>
      </div>

      {tab === 'harmony'
        ? <LightHarmonyTab apiKey={apiKey} showToast={showToast} />
        : <PromptGeneratorTab apiKey={apiKey} showToast={showToast} />}

      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
