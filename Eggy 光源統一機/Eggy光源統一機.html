<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const IMAGE_MODEL = 'gemini-2.5-flash-image';
const TEXT_MODEL = 'gemini-2.5-flash';

// ===== Helpers =====
function readFileAsDataURL(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

function dataURLtoBase64(dataURL) {
  return dataURL.split(',')[1];
}

function uid() {
  return Math.random().toString(36).slice(2, 10);
}

function downloadBase64(base64, filename, mime = 'image/png') {
  const a = document.createElement('a');
  a.href = `data:${mime};base64,${base64}`;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

// ===== Gemini API =====
async function callGeminiImage(apiKey, parts) {
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${IMAGE_MODEL}:generateContent`;
  const body = {
    contents: [{ parts }],
    generationConfig: { responseModalities: ['TEXT', 'IMAGE'] }
  };
  const delays = [3000, 6000, 10000, 15000, 20000];
  let lastError;
  for (let attempt = 0; attempt <= delays.length; attempt++) {
    if (attempt > 0) await new Promise(r => setTimeout(r, delays[attempt - 1]));
    try {
      const resp = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-goog-api-key': apiKey },
        body: JSON.stringify(body)
      });
      if (resp.status === 429) throw new Error('額度已用完或請求過於頻繁');
      if (resp.status === 401 || resp.status === 403) throw new Error('API Key 無效或沒有權限');
      if (resp.status >= 500) { lastError = new Error(`伺服器錯誤 ${resp.status}`); continue; }
      if (!resp.ok) {
        const t = await resp.text().catch(() => '');
        throw new Error(`API ${resp.status}: ${t.slice(0, 200)}`);
      }
      const data = await resp.json();
      const cand = data.candidates && data.candidates[0];
      if (!cand) throw new Error('沒有回傳結果');
      const imgPart = cand.content.parts.find(p => p.inlineData);
      if (!imgPart) throw new Error('回傳沒有圖片（可能被安全過濾擋下）');
      return imgPart.inlineData.data;
    } catch (err) {
      const msg = err.message || '';
      if (msg.includes('API Key') || msg.includes('額度') || msg.startsWith('API ') || msg.includes('沒有') || msg.includes('安全')) throw err;
      lastError = err;
    }
  }
  throw lastError || new Error('多次重試後仍失敗');
}

async function callGeminiText(apiKey, parts) {
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${TEXT_MODEL}:generateContent`;
  const body = { contents: [{ parts }] };
  const delays = [2000, 5000, 10000, 15000];
  let lastError;
  for (let attempt = 0; attempt <= delays.length; attempt++) {
    if (attempt > 0) await new Promise(r => setTimeout(r, delays[attempt - 1]));
    try {
      const resp = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-goog-api-key': apiKey },
        body: JSON.stringify(body)
      });
      if (resp.status === 429) throw new Error('額度已用完或請求過於頻繁');
      if (resp.status === 401 || resp.status === 403) throw new Error('API Key 無效或沒有權限');
      if (resp.status >= 500) { lastError = new Error(`伺服器錯誤 ${resp.status}`); continue; }
      if (!resp.ok) {
        const t = await resp.text().catch(() => '');
        throw new Error(`API ${resp.status}: ${t.slice(0, 200)}`);
      }
      const data = await resp.json();
      const cand = data.candidates && data.candidates[0];
      if (!cand) throw new Error('沒有回傳結果');
      const textPart = cand.content.parts.find(p => p.text);
      if (!textPart) throw new Error('回傳沒有文字');
      return textPart.text.trim();
    } catch (err) {
      const msg = err.message || '';
      if (msg.includes('API Key') || msg.includes('額度') || msg.startsWith('API ') || msg.includes('沒有')) throw err;
      lastError = err;
    }
  }
  throw lastError || new Error('多次重試後仍失敗');
}

// ===== API Key Section =====
function ApiKeySection({ apiKey, setApiKey }) {
  const [show, setShow] = useState(false);
  const [editing, setEditing] = useState(!apiKey);
  const inputRef = useRef(null);

  const save = () => {
    const v = inputRef.current.value.trim();
    if (!v) return;
    localStorage.setItem('gemini_api_key', v);
    setApiKey(v);
    setEditing(false);
  };
  const clear = () => {
    localStorage.removeItem('gemini_api_key');
    setApiKey('');
    setEditing(true);
  };

  return (
    <div className="section">
      <h2>Gemini API Key</h2>
      {editing ? (
        <div className="api-key-bar">
          <div className="api-key-input-wrap">
            <input
              ref={inputRef}
              type={show ? 'text' : 'password'}
              placeholder="貼上你的 Gemini API Key"
              defaultValue={apiKey}
              onKeyDown={e => e.key === 'Enter' && save()}
            />
            <button className="eye-toggle" onClick={() => setShow(!show)}>{show ? '🙈' : '👁'}</button>
          </div>
          <button className="btn btn-primary btn-small" onClick={save}>儲存</button>
        </div>
      ) : (
        <div className="api-key-bar">
          <span className="status-saved">✓ 已儲存（瀏覽器本機）</span>
          <button className="btn btn-secondary btn-small" onClick={() => setEditing(true)}>更換</button>
          <button className="btn btn-danger btn-small" onClick={clear}>清除</button>
        </div>
      )}
      <div className="api-hint">
        在 <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener">Google AI Studio</a> 申請；只儲存在你的瀏覽器中，不會上傳。
      </div>
    </div>
  );
}

// ===== Drop Zone =====
function DropZone({ onFiles, multiple = true, hint = '點擊或拖曳照片到這裡（可一次多張）' }) {
  const [dragging, setDragging] = useState(false);
  const inputRef = useRef(null);

  const handleFiles = (fileList) => {
    const files = Array.from(fileList).filter(f => f.type.startsWith('image/'));
    if (files.length) onFiles(files);
  };

  return (
    <>
      <div
        className={`drop-zone ${dragging ? 'dragging' : ''}`}
        onClick={() => inputRef.current.click()}
        onDragOver={e => { e.preventDefault(); setDragging(true); }}
        onDragLeave={() => setDragging(false)}
        onDrop={e => { e.preventDefault(); setDragging(false); handleFiles(e.dataTransfer.files); }}
      >
        <p><strong>＋</strong> {hint}</p>
      </div>
      <input
        ref={inputRef}
        type="file"
        accept="image/*"
        multiple={multiple}
        style={{ display: 'none' }}
        onChange={e => { handleFiles(e.target.files); e.target.value = ''; }}
      />
    </>
  );
}

// ===== Lighting profile analyzer =====
async function analyzeLightingProfile(apiKey, refPhoto) {
  const instruction = `你會看到一張參考圖。任務是抽出它的「光線與色彩 DNA」，之後要套用到別張圖去做色彩分級／重新打光。

請輸出**結構化文字**（不要 JSON、不要 markdown、不要編號標題；用以下小節，每節一行純文字描述）：

[OVERALL LOOK]
一句話描述整體視覺調性（例：warm amber-brown Pixar-like soft window light）。

[COLOR TEMPERATURE]
warm / neutral / cool + 大約色溫感受（例：warm ~3200K feel, slight magenta tint）。

[KEY LIGHT]
方向 + 硬度 + 顏色（例：soft top-front key from camera upper-right, warm amber 3000K）。

[FILL / AMBIENT]
補光與環境光顏色（例：low-intensity cool teal-blue ambient fill from shadow side）。

[SHADOWS]
陰影顏色傾向 + 深度 + 軟硬（例：warm dark brown shadows, medium depth, soft falloff, slight green-teal in deep occlusion）。

[HIGHLIGHTS]
高光顏色 + 衰減（例：creamy warm-white highlights with gentle roll-off, no clipping）。

[CONTRAST & SATURATION]
對比 + 飽和度（例：medium-low contrast with lifted blacks, muted desaturated palette around 0.7x）。

[ANCHOR COLORS — 在這個光線下，下列素材會呈現什麼色（用色相詞描述，不要 hex）]
- pure white surface should look: ...
- mid-gray (18%) should look: ...
- pure black / deep shadow should look: ...
- caucasian skin should look: ...
- warm tan / brown fur should look: ...
- specular highlight on glossy material: ...
- distant background tint should look: ...

[FILM / RENDER REFERENCE]
一句相似的影像參考（例：Kodak Portra 400 warmth, Pixar interior key+fill, golden-hour ARRI cinematic）。

嚴格規則（必遵守）：
- **絕對不可以描述任何畫面內容**：不要提人物、動物、物件、場景、動作、構圖、表情、姿勢、背景物。
- 只描述「光、色、調性」。
- 全部用英文輸出（術語精確）。
- 直接輸出小節內容，不要前言、不要 JSON、不要把上面這段提示複述出來。`;
  const parts = [
    { inlineData: { mimeType: refPhoto.mime, data: refPhoto.base64 } },
    { text: instruction }
  ];
  return await callGeminiText(apiKey, parts);
}

// ===== Tab 1: Light Harmony =====
function LightHarmonyTab({ apiKey, showToast }) {
  // photo: { id, name, mime, dataURL, base64, status, resultBase64?, error? }
  const [photos, setPhotos] = useState([]);
  const [referenceId, setReferenceId] = useState(null);
  const [extraInstruction, setExtraInstruction] = useState('');
  const [running, setRunning] = useState(false);
  const [lightingProfile, setLightingProfile] = useState('');
  const [profileForRefId, setProfileForRefId] = useState(null);
  const [analyzing, setAnalyzing] = useState(false);

  const addFiles = async (files) => {
    const items = await Promise.all(files.map(async f => {
      const dataURL = await readFileAsDataURL(f);
      return {
        id: uid(),
        name: f.name,
        mime: f.type || 'image/png',
        dataURL,
        base64: dataURLtoBase64(dataURL),
        status: 'pending',
      };
    }));
    setPhotos(prev => [...prev, ...items]);
    if (!referenceId && items.length > 0) {
      setReferenceId(items[0].id);
    }
  };

  const removePhoto = (id) => {
    setPhotos(prev => prev.filter(p => p.id !== id));
    if (referenceId === id) {
      const remaining = photos.filter(p => p.id !== id);
      setReferenceId(remaining.length ? remaining[0].id : null);
      setLightingProfile('');
      setProfileForRefId(null);
    }
  };

  const reference = photos.find(p => p.id === referenceId);
  const targets = photos.filter(p => p.id !== referenceId);
  const profileStale = reference && profileForRefId && profileForRefId !== referenceId;

  const analyze = async () => {
    if (!apiKey) return showToast('請先設定 API Key');
    if (!reference) return showToast('請先指定一張楷模圖');
    setAnalyzing(true);
    try {
      const text = await analyzeLightingProfile(apiKey, reference);
      setLightingProfile(text);
      setProfileForRefId(reference.id);
    } catch (err) {
      showToast('分析失敗：' + (err.message || '未知錯誤'));
    }
    setAnalyzing(false);
  };

  const buildApplyPrompt = (profile) => {
    let p = `你會收到一張「目標圖」。把它當成「未調光的母片」。

任務：以下方「色調規格」**重新打光／重新調色**這張目標圖，輸出一張新版本。把目標圖視為相同場景在不同燈光下的另一個拍攝瞬間，重點是讓素材在新光線下「應該呈現的顏色」與規格中的 ANCHOR COLORS 相符。

== 必須像素級保留（不可以變動）==
- 主體身份、人物五官比例、表情、姿勢、肢體位置、視線方向
- 服裝樣式、配件、毛髮形狀與輪廓、物件形狀與位置
- 構圖、鏡頭視角、景別、長寬比、解析度
- 背景元素的位置與形狀
- 畫面中的文字
- 整體繪畫風格（不要把 3D 卡通變成寫實照片，也不要反過來）

== 嚴格禁止 ==
- 新增、移除、移動、變形、合成、塗抹、修補任何物件或元素
- 加入新角色、新道具、新背景、新文字
- 改變人物身份或表情、改變動作、改變視角
- 把規格描述中的詞彙當作要「畫進畫面」的東西（規格是調光指令，不是內容）

== 允許做的事 ==
- 全域與半局域的色彩分級：白平衡、色溫、色相偏移、飽和度、對比、Levels/Curves、Color Balance、Photo Filter
- 重新分配光暗：陰影色、中間調色、高光色、ambient 色
- 讓素材在新光線下呈現符合 ANCHOR COLORS 的色彩（例如：規格說白面在這光線下偏暖奶油色，那麼目標圖中本該為白色的素材就要往該色相靠攏；皮膚同理；陰影同理）
- 細微的明暗 re-shading 以對齊 KEY LIGHT 的方向感（但不要改變主體形狀）

色調規格（你的調光目標）：
"""
${profile}
"""

再次強調：保留目標圖所有內容像素，只重新打光重新調色，輸出尺寸與長寬比與目標圖一致。`;
    if (extraInstruction.trim()) {
      p += `\n\n額外微調指示：${extraInstruction.trim()}`;
    }
    return p;
  };

  const updatePhoto = (id, patch) => {
    setPhotos(prev => prev.map(p => p.id === id ? { ...p, ...patch } : p));
  };

  const runOne = async (id, profileOverride) => {
    if (!apiKey) return showToast('請先設定 API Key');
    const profile = profileOverride !== undefined ? profileOverride : lightingProfile;
    if (!profile.trim()) return showToast('請先分析或填入色調規格');
    const t = photos.find(p => p.id === id);
    if (!t) return;
    updatePhoto(id, { status: 'processing', error: null });
    try {
      const parts = [
        { inlineData: { mimeType: t.mime, data: t.base64 } },
        { text: buildApplyPrompt(profile) }
      ];
      const result = await callGeminiImage(apiKey, parts);
      updatePhoto(id, { status: 'done', resultBase64: result });
    } catch (err) {
      updatePhoto(id, { status: 'error', error: err.message || '未知錯誤' });
    }
  };

  const runHarmonize = async () => {
    if (!apiKey) return showToast('請先設定 API Key');
    if (!reference) return showToast('請先指定一張楷模圖');
    if (targets.length === 0) return showToast('至少需要一張目標圖');
    setRunning(true);
    let profile = lightingProfile;
    if (!profile.trim() || profileForRefId !== referenceId) {
      try {
        profile = await analyzeLightingProfile(apiKey, reference);
        setLightingProfile(profile);
        setProfileForRefId(reference.id);
      } catch (err) {
        showToast('分析楷模光線失敗：' + (err.message || '未知錯誤'));
        setRunning(false);
        return;
      }
    }
    for (const t of targets) {
      updatePhoto(t.id, { status: 'processing', error: null });
      try {
        const parts = [
          { inlineData: { mimeType: t.mime, data: t.base64 } },
          { text: buildApplyPrompt(profile) }
        ];
        const result = await callGeminiImage(apiKey, parts);
        updatePhoto(t.id, { status: 'done', resultBase64: result });
      } catch (err) {
        updatePhoto(t.id, { status: 'error', error: err.message || '未知錯誤' });
      }
    }
    setRunning(false);
  };

  const downloadAll = async () => {
    const done = photos.filter(p => p.status === 'done' && p.resultBase64);
    if (done.length === 0) return showToast('還沒有完成的結果');
    const zip = new JSZip();
    done.forEach(p => {
      const baseName = p.name.replace(/\.[^.]+$/, '');
      zip.file(`harmonized_${baseName}.png`, p.resultBase64, { base64: true });
    });
    const blob = await zip.generateAsync({ type: 'blob' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'harmonized_photos.zip';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  const clearAll = () => {
    if (!confirm('清空所有照片？')) return;
    setPhotos([]); setReferenceId(null);
  };

  return (
    <>
      <div className="section">
        <h2>1. 上傳要統一光源的照片</h2>
        <p className="subtitle">先放楷模圖、再放需要調整的圖。也可以拖曳多張一次上傳。</p>
        <DropZone onFiles={addFiles} />
        {photos.length > 0 && (
          <>
            <div className="bar">
              <strong>共 {photos.length} 張</strong>
              <span className="spacer" />
              <button className="btn btn-danger btn-small" onClick={clearAll}>清空</button>
            </div>
            <div className="img-grid">
              {photos.map(p => (
                <div key={p.id} className={`img-card ${p.id === referenceId ? 'reference' : ''}`}>
                  <img src={p.dataURL} alt={p.name} />
                  {p.id === referenceId && <span className="ref-badge">楷模</span>}
                  {p.id !== referenceId && p.status !== 'pending' && (
                    <span className={`status-pill ${p.status}`}>
                      {p.status === 'processing' ? '處理中' : p.status === 'done' ? '完成' : p.status === 'error' ? '失敗' : ''}
                    </span>
                  )}
                  <div className="img-card-body">
                    <div className="img-card-name">{p.name}</div>
                    <div className="img-card-actions">
                      {p.id !== referenceId && (
                        <button className="btn btn-secondary btn-small" onClick={() => setReferenceId(p.id)}>設為楷模</button>
                      )}
                      <button className="btn btn-danger btn-small" onClick={() => removePhoto(p.id)}>移除</button>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </>
        )}
      </div>

      <div className="section">
        <h2>2. 楷模光線分析（色調規格）</h2>
        <p className="subtitle">
          只把「光線 DNA」抽成文字（含色溫、光向、陰影／高光色、白／灰／黑／膚色等錨點色），再丟給目標圖重新打光 —— 這樣 AI 不會把楷模圖的內容混進結果裡。
          <br />
          <span style={{ color: '#7A5C50' }}>⚠ 注意：AI 是用「色彩分級」邏輯重新打光，不是物理級重打光。如果不同圖中相同物件的素材色原本差很大（例如同一條裙子在 A 圖偏白、在 B 圖偏灰），最後仍可能有差異。這時可以在下方框內手動補上物件級指示，例如「dress should always read as cream-tan」「skin should always look warm pink-brown」等，會比較貼近。</span>
          {profileStale && <span style={{ color: '#B85C00', fontWeight: 600 }}><br />⚠ 楷模圖已換，建議重新分析</span>}
        </p>
        <div className="bar" style={{ marginTop: 0, marginBottom: 12 }}>
          <button
            className="btn btn-secondary"
            onClick={analyze}
            disabled={analyzing || !apiKey || !reference}
          >
            {analyzing ? <><span className="spinner" style={{ borderTopColor: '#A81C2B', borderColor: 'rgba(168,28,43,0.3)' }} /> 分析中…</> : (lightingProfile ? '🔄 重新分析楷模光線' : '🔍 分析楷模光線')}
          </button>
          {lightingProfile && <span className="status-saved">✓ 已分析</span>}
        </div>
        <textarea
          rows={6}
          placeholder="按上方按鈕讓 AI 自動分析楷模圖的光線色彩特徵；也可以在這裡手動撰寫或編輯。直接按下方「統一所有照片光源」也會自動先分析。"
          value={lightingProfile}
          onChange={e => setLightingProfile(e.target.value)}
        />
        <div className="field-hint">內容只描述色溫、光線方向、陰影、色調等，不會描述畫面內容。可以自由編輯／覆蓋。</div>
      </div>

      <div className="section">
        <h2>3. 額外指示（可留空）</h2>
        <textarea
          rows={2}
          placeholder="例如：保留人物膚色不要過度泛黃、輕微提高陰影細節 …"
          value={extraInstruction}
          onChange={e => setExtraInstruction(e.target.value)}
        />
        <div className="field-hint">這段文字會附加到調光指令裡。</div>
      </div>

      <div className="section">
        <h2>4. 開始統一光源</h2>
        <div className="bar">
          <button
            className="btn btn-primary btn-large"
            onClick={runHarmonize}
            disabled={running || !apiKey || !reference || targets.length === 0}
          >
            {running ? <><span className="spinner" /> 處理中…</> : '🎨 統一所有照片光源'}
          </button>
          <button className="btn btn-secondary" onClick={downloadAll} disabled={running}>
            ⬇ 下載全部結果（.zip）
          </button>
        </div>

        {targets.some(t => t.resultBase64) && (
          <div style={{ marginTop: 24 }}>
            <h2 style={{ marginBottom: 12 }}>對比結果</h2>
            {targets.filter(t => t.resultBase64 || t.status === 'error').map(t => (
              <div key={t.id} className="compare-row">
                <div className="compare-col">
                  <div className="compare-label">原圖：{t.name}</div>
                  <img src={t.dataURL} alt="原圖" />
                </div>
                <div className="compare-col">
                  <div className="compare-label">
                    {t.status === 'error' ? `失敗：${t.error}` : '統一後'}
                  </div>
                  {t.resultBase64 ? (
                    <>
                      <img src={`data:image/png;base64,${t.resultBase64}`} alt="結果" />
                      <div style={{ marginTop: 8, display: 'flex', gap: 8, justifyContent: 'center' }}>
                        <button
                          className="btn btn-secondary btn-small"
                          onClick={() => downloadBase64(t.resultBase64, `harmonized_${t.name.replace(/\.[^.]+$/, '')}.png`)}
                        >下載</button>
                        <button
                          className="btn btn-secondary btn-small"
                          onClick={() => runOne(t.id)}
                          disabled={running}
                        >重做</button>
                      </div>
                    </>
                  ) : (
                    <button
                      className="btn btn-secondary btn-small"
                      onClick={() => runOne(t.id)}
                      disabled={running}
                    >重試</button>
                  )}
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    </>
  );
}

// ===== Tab 2: Character Consistency =====
function CharacterConsistencyTab({ apiKey, showToast }) {
  // refPhotos: 角色設定參考（多張，定義 canonical 外觀）
  // targets: 需要修正的目標圖
  const [refPhotos, setRefPhotos] = useState([]);
  const [targets, setTargets] = useState([]);
  const [characterNotes, setCharacterNotes] = useState('');
  const [extraInstruction, setExtraInstruction] = useState('');
  const [running, setRunning] = useState(false);
  const [analyzingChar, setAnalyzingChar] = useState(false);

  const handleAddRef = async (files) => {
    const items = await Promise.all(files.map(async f => {
      const dataURL = await readFileAsDataURL(f);
      return {
        id: uid(), name: f.name, mime: f.type || 'image/png',
        dataURL, base64: dataURLtoBase64(dataURL)
      };
    }));
    setRefPhotos(prev => [...prev, ...items]);
  };

  const handleAddTarget = async (files) => {
    const items = await Promise.all(files.map(async f => {
      const dataURL = await readFileAsDataURL(f);
      return {
        id: uid(), name: f.name, mime: f.type || 'image/png',
        dataURL, base64: dataURLtoBase64(dataURL),
        status: 'pending'
      };
    }));
    setTargets(prev => [...prev, ...items]);
  };

  const removeRef = (id) => setRefPhotos(prev => prev.filter(p => p.id !== id));
  const removeTarget = (id) => setTargets(prev => prev.filter(p => p.id !== id));
  const updateTarget = (id, patch) => setTargets(prev => prev.map(p => p.id === id ? { ...p, ...patch } : p));

  const analyzeCharacter = async () => {
    if (!apiKey) return showToast('請先設定 API Key');
    if (refPhotos.length === 0) return showToast('請先上傳角色參考圖');
    setAnalyzingChar(true);
    try {
      const parts = refPhotos.map(p => ({ inlineData: { mimeType: p.mime, data: p.base64 } }));
      parts.push({ text: `你會看到 ${refPhotos.length} 張同一個角色的設定圖。請輸出一份「角色外觀規格書」，作為之後修正其他圖片的依據。

請涵蓋（依序、每項一行純文字）：

[CHARACTER TYPE]
角色類別與物種（例：anthropomorphic golden retriever character, cartoon 3D style）

[FACE / HEAD]
頭型、五官比例、口鼻、耳朵形狀與位置、臉部特徵

[EYES]
眼睛顏色（具體色相，例：dark amber-brown）、形狀、大小、瞳孔、眼神特徵

[HAIR / FUR]
毛色 / 髮色（具體色相）、毛長、毛質感、紋路、有無分區色塊

[BODY]
體型、比例、身高感、肢體特徵

[CLOTHING / OUTFIT]
標準服裝（如果參考圖中是穩定的）：上衣顏色款式材質、下裝、鞋、配件、配飾、首飾。如果不同參考圖有不同服裝，列出共通元素。

[ART STYLE]
繪畫風格（例：Pixar-like 3D render, soft shading, slightly stylized proportions）

[DEFINING FEATURES]
最容易被畫錯但不能跑掉的關鍵特徵（例：always has small white chest patch / left ear has a notch / wears a single gold ring on right paw）

嚴格規則：
- 用英文輸出術語精確
- 不要寫場景、姿勢、表情、光線、構圖（那些是會在每張圖變動的，不屬於角色本體）
- 直接輸出小節內容，不要前言、不要 JSON、不要把這段提示複述出來
- 控制在約 250 字以內` });
      const text = await callGeminiText(apiKey, parts);
      setCharacterNotes(text);
    } catch (err) {
      showToast('分析失敗：' + (err.message || '未知錯誤'));
    }
    setAnalyzingChar(false);
  };

  const buildFixPrompt = () => {
    let p = `你會收到：
1. 數張「角色設定參考圖」（canonical character reference）
2. 一張「目標圖」（character drift — 角色外觀跑掉了，需要修正）
3. 一份「角色外觀規格書」

任務：輸出一張新圖片，把目標圖中的角色外觀對齊到參考圖與規格書，但**完全保留**目標圖的其他一切。

== 必須像素級保留（從目標圖延續，不可以變動）==
- 構圖、鏡頭視角、景別、長寬比
- 角色的姿勢、動作、肢體位置、視線方向、臉部表情情緒
- 背景所有元素（位置、形狀、顏色）
- 整體光線、色溫、明暗氛圍、陰影方向與顏色
- 道具、配件位置（除非該配件本身是要修正的角色標準配件）
- 解析度與長寬比

== 必須對齊到參考的部分（角色本體 DNA）==
- 物種 / 角色類型
- 五官比例、頭型、口鼻、耳朵形狀
- 眼睛顏色與形狀
- 毛色 / 髮色 / 毛質、毛紋分布
- 體型比例
- 標準服裝樣式與顏色（如果規格書有）
- 配件 / 標誌性特徵
- 繪畫風格（線條、陰影方式、stylization 程度）

== 嚴格禁止 ==
- 改變姿勢、動作、表情、構圖、視角、背景
- 改變光線氛圍、色溫、整體調性
- 把參考圖的構圖 / 背景 / 姿勢混進目標圖
- 加入參考圖中的次要元素（除非它是角色 DNA 的一部分）

角色外觀規格書：
"""
${characterNotes || '（尚未分析，請只依據參考圖視覺對齊）'}
"""

再次強調：保留目標圖的所有「情境」（pose, action, scene, lighting, composition），只把「角色本體 DNA」對齊到參考圖。輸出長寬比與目標圖一致。`;
    if (extraInstruction.trim()) {
      p += `\n\n額外指示：${extraInstruction.trim()}`;
    }
    return p;
  };

  const runOne = async (id) => {
    if (!apiKey) return showToast('請先設定 API Key');
    if (refPhotos.length === 0) return showToast('請先上傳角色參考圖');
    const t = targets.find(x => x.id === id);
    if (!t) return;
    updateTarget(id, { status: 'processing', error: null });
    try {
      const parts = [];
      refPhotos.forEach(r => parts.push({ inlineData: { mimeType: r.mime, data: r.base64 } }));
      parts.push({ text: `↑ 以上 ${refPhotos.length} 張是「角色設定參考圖」，定義角色本體外觀。**不要**從這些圖複製姿勢、構圖、背景、表情。` });
      parts.push({ inlineData: { mimeType: t.mime, data: t.base64 } });
      parts.push({ text: '↑ 這是「目標圖」（角色跑掉了，要被修正的圖）。請保留它的構圖、姿勢、表情、背景、光線。' });
      parts.push({ text: buildFixPrompt() });
      const result = await callGeminiImage(apiKey, parts);
      updateTarget(id, { status: 'done', resultBase64: result });
    } catch (err) {
      updateTarget(id, { status: 'error', error: err.message || '未知錯誤' });
    }
  };

  const runAll = async () => {
    if (!apiKey) return showToast('請先設定 API Key');
    if (refPhotos.length === 0) return showToast('請先上傳角色參考圖');
    if (targets.length === 0) return showToast('請先上傳要修正的目標圖');
    setRunning(true);
    for (const t of targets) {
      updateTarget(t.id, { status: 'processing', error: null });
      try {
        const parts = [];
        refPhotos.forEach(r => parts.push({ inlineData: { mimeType: r.mime, data: r.base64 } }));
        parts.push({ text: `↑ 以上 ${refPhotos.length} 張是「角色設定參考圖」。**不要**從這些圖複製姿勢、構圖、背景、表情。` });
        parts.push({ inlineData: { mimeType: t.mime, data: t.base64 } });
        parts.push({ text: '↑ 這是「目標圖」。請保留它的構圖、姿勢、表情、背景、光線。' });
        parts.push({ text: buildFixPrompt() });
        const result = await callGeminiImage(apiKey, parts);
        updateTarget(t.id, { status: 'done', resultBase64: result });
      } catch (err) {
        updateTarget(t.id, { status: 'error', error: err.message || '未知錯誤' });
      }
    }
    setRunning(false);
  };

  const downloadAll = async () => {
    const done = targets.filter(p => p.status === 'done' && p.resultBase64);
    if (done.length === 0) return showToast('還沒有完成的結果');
    const zip = new JSZip();
    done.forEach(p => {
      const baseName = p.name.replace(/\.[^.]+$/, '');
      zip.file(`fixed_${baseName}.png`, p.resultBase64, { base64: true });
    });
    const blob = await zip.generateAsync({ type: 'blob' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'character_fixed.zip';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  const clearAll = () => {
    if (!confirm('清空所有圖片與規格書？')) return;
    setRefPhotos([]); setTargets([]); setCharacterNotes('');
  };

  return (
    <>
      <div className="section">
        <h2>1. 上傳「角色設定參考圖」</h2>
        <p className="subtitle">放幾張角色長對的圖（眼睛顏色、髮型、服裝都正確的版本）。建議 2–4 張不同角度，越完整越穩。</p>
        <DropZone onFiles={handleAddRef} hint="點擊或拖曳「角色設定參考圖」（可一次多張）" />
        {refPhotos.length > 0 && (
          <div className="img-grid">
            {refPhotos.map(p => (
              <div key={p.id} className="img-card reference">
                <img src={p.dataURL} alt={p.name} />
                <span className="ref-badge">設定</span>
                <div className="img-card-body">
                  <div className="img-card-name">{p.name}</div>
                  <div className="img-card-actions">
                    <button className="btn btn-danger btn-small" onClick={() => removeRef(p.id)}>移除</button>
                  </div>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>

      <div className="section">
        <h2>2. 角色外觀規格書（自動分析）</h2>
        <p className="subtitle">把參考圖的角色 DNA 抽成文字（眼睛顏色、毛色、服裝、繪畫風格…），可手動編輯補充。</p>
        <div className="bar" style={{ marginTop: 0, marginBottom: 12 }}>
          <button
            className="btn btn-secondary"
            onClick={analyzeCharacter}
            disabled={analyzingChar || !apiKey || refPhotos.length === 0}
          >
            {analyzingChar ? <><span className="spinner" style={{ borderTopColor: '#A81C2B', borderColor: 'rgba(168,28,43,0.3)' }} /> 分析中…</> : (characterNotes ? '🔄 重新分析角色' : '🔍 分析角色外觀')}
          </button>
          {characterNotes && <span className="status-saved">✓ 已分析</span>}
        </div>
        <textarea
          rows={8}
          placeholder="按上方按鈕讓 AI 從參考圖抽出角色規格；也可以手動撰寫或編輯（建議至少寫眼睛顏色、毛色／髮色、服裝、最容易跑掉的特徵）。"
          value={characterNotes}
          onChange={e => setCharacterNotes(e.target.value)}
        />
        <div className="field-hint">越具體越穩定。可以加上「always has X」「never has Y」這類強指示。</div>
      </div>

      <div className="section">
        <h2>3. 上傳「跑掉了要修正的目標圖」</h2>
        <DropZone onFiles={handleAddTarget} hint="點擊或拖曳目標圖（可一次多張）" />
        {targets.length > 0 && (
          <>
            <div className="bar">
              <strong>共 {targets.length} 張</strong>
              <span className="spacer" />
              <button className="btn btn-danger btn-small" onClick={clearAll}>全部清空</button>
            </div>
            <div className="img-grid">
              {targets.map(p => (
                <div key={p.id} className="img-card">
                  <img src={p.dataURL} alt={p.name} />
                  {p.status !== 'pending' && (
                    <span className={`status-pill ${p.status}`}>
                      {p.status === 'processing' ? '處理中' : p.status === 'done' ? '完成' : p.status === 'error' ? '失敗' : ''}
                    </span>
                  )}
                  <div className="img-card-body">
                    <div className="img-card-name">{p.name}</div>
                    <div className="img-card-actions">
                      <button className="btn btn-danger btn-small" onClick={() => removeTarget(p.id)}>移除</button>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </>
        )}
      </div>

      <div className="section">
        <h2>4. 額外指示（可留空）</h2>
        <textarea
          rows={2}
          placeholder="例如：保留目標圖的服裝（不要套用設定圖的服裝）、只修五官 …"
          value={extraInstruction}
          onChange={e => setExtraInstruction(e.target.value)}
        />
      </div>

      <div className="section">
        <h2>5. 開始修正角色</h2>
        <div className="bar">
          <button
            className="btn btn-primary btn-large"
            onClick={runAll}
            disabled={running || !apiKey || refPhotos.length === 0 || targets.length === 0}
          >
            {running ? <><span className="spinner" /> 處理中…</> : '✨ 修正所有目標圖'}
          </button>
          <button className="btn btn-secondary" onClick={downloadAll} disabled={running}>
            ⬇ 下載全部結果（.zip）
          </button>
        </div>

        {targets.some(t => t.resultBase64) && (
          <div style={{ marginTop: 24 }}>
            <h2 style={{ marginBottom: 12 }}>對比結果</h2>
            {targets.filter(t => t.resultBase64 || t.status === 'error').map(t => (
              <div key={t.id} className="compare-row">
                <div className="compare-col">
                  <div className="compare-label">原圖：{t.name}</div>
                  <img src={t.dataURL} alt="原圖" />
                </div>
                <div className="compare-col">
                  <div className="compare-label">
                    {t.status === 'error' ? `失敗：${t.error}` : '修正後'}
                  </div>
                  {t.resultBase64 ? (
                    <>
                      <img src={`data:image/png;base64,${t.resultBase64}`} alt="結果" />
                      <div style={{ marginTop: 8, display: 'flex', gap: 8, justifyContent: 'center' }}>
                        <button
                          className="btn btn-secondary btn-small"
                          onClick={() => downloadBase64(t.resultBase64, `fixed_${t.name.replace(/\.[^.]+$/, '')}.png`)}
                        >下載</button>
                        <button
                          className="btn btn-secondary btn-small"
                          onClick={() => runOne(t.id)}
                          disabled={running}
                        >重做</button>
                      </div>
                    </>
                  ) : (
                    <button
                      className="btn btn-secondary btn-small"
                      onClick={() => runOne(t.id)}
                      disabled={running}
                    >重試</button>
                  )}
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    </>
  );
}

// ===== Tab 3: Prompt Generator =====
function PromptGeneratorTab({ apiKey, showToast }) {
  const [photos, setPhotos] = useState([]); // { id, name, mime, dataURL, base64, status, prompt?, error? }
  const [running, setRunning] = useState(false);
  const [language, setLanguage] = useState('en');
  const [length, setLength] = useState('medium');
  const [extraGuidance, setExtraGuidance] = useState('');

  const addFiles = async (files) => {
    const items = await Promise.all(files.map(async f => {
      const dataURL = await readFileAsDataURL(f);
      return {
        id: uid(), name: f.name, mime: f.type || 'image/png',
        dataURL, base64: dataURLtoBase64(dataURL), status: 'pending'
      };
    }));
    setPhotos(prev => [...prev, ...items]);
  };

  const removePhoto = (id) => setPhotos(prev => prev.filter(p => p.id !== id));
  const updatePhoto = (id, patch) => setPhotos(prev => prev.map(p => p.id === id ? { ...p, ...patch } : p));

  const lengthHint = {
    short: '一段約 60–100 字',
    medium: '一段約 120–200 字',
    long: '一段約 220–350 字'
  }[length];

  const langHint = language === 'en' ? '使用「英文」輸出整段 prompt' : '使用「繁體中文」輸出整段 prompt';

  const buildInstruction = () => {
    return `你是一個圖像描述助理，任務是看圖後產生一段可直接餵給 AI 圖像生成器的 prompt。

**嚴格規則（避免侵權，務必遵守）：**
1. 絕對不可以提及任何專有名詞，包括但不限於：
   - 真實人名、藝人、政治人物、歷史人物
   - 卡通／動漫／電影／遊戲角色名（皮卡丘、米奇、瑪利歐、哈利波特等一律不行）
   - 任何品牌、商標、商品名稱（Nike、Coca-Cola、iPhone、星巴克等）
   - 任何畫家／攝影師／導演名字、特定畫派或作品名稱（如 "in the style of XXX"）
   - 城市名、知名地標名稱、國家名（巴黎鐵塔、東京塔、自由女神 → 應改為「歐式鐵製觀景塔」「具有古典造型的銅製女性雕像」這類描述）
   - 任何商業字體名、軟體名、攝影器材型號
2. 用通用、描述性的詞彙替代專有名詞，例如：
   - 不寫「迪士尼風格」→ 寫「圓潤可愛的卡通風格、大眼睛、柔和色彩」
   - 不寫「吉卜力」→ 寫「手繪日式動畫感、柔和水彩光線、細膩自然背景」
   - 不寫「賽博龐克」是常見詞，可以保留，但不要寫「銀翼殺手」
3. 描述要具體：主體（外觀、年齡感、表情、姿勢、服裝材質與顏色）、構圖（鏡頭距離、視角、景別）、光線（方向、色溫、強弱、陰影特性）、色彩（調性、對比、飽和度）、環境（地點氛圍、時間、天氣、空間元素）、氛圍（情緒）、媒材／風格（攝影／插畫／3D／油畫感等）、品質詞。
4. 輸出**單一段落**純文字 prompt，${lengthHint}，${langHint}。
5. 不要加標題、不要編號、不要引號、不要 markdown，只輸出 prompt 本身那一段文字。

${extraGuidance.trim() ? '額外要求：' + extraGuidance.trim() : ''}`;
  };

  const runOne = async (id) => {
    if (!apiKey) return showToast('請先設定 API Key');
    const p = photos.find(x => x.id === id);
    if (!p) return;
    updatePhoto(id, { status: 'processing', error: null });
    try {
      const parts = [
        { inlineData: { mimeType: p.mime, data: p.base64 } },
        { text: buildInstruction() }
      ];
      const text = await callGeminiText(apiKey, parts);
      updatePhoto(id, { status: 'done', prompt: text });
    } catch (err) {
      updatePhoto(id, { status: 'error', error: err.message || '未知錯誤' });
    }
  };

  const runAll = async () => {
    if (!apiKey) return showToast('請先設定 API Key');
    if (photos.length === 0) return showToast('請先上傳圖片');
    setRunning(true);
    const instruction = buildInstruction();
    for (const p of photos) {
      if (p.status === 'done') continue;
      updatePhoto(p.id, { status: 'processing', error: null });
      try {
        const parts = [
          { inlineData: { mimeType: p.mime, data: p.base64 } },
          { text: instruction }
        ];
        const text = await callGeminiText(apiKey, parts);
        updatePhoto(p.id, { status: 'done', prompt: text });
      } catch (err) {
        updatePhoto(p.id, { status: 'error', error: err.message || '未知錯誤' });
      }
    }
    setRunning(false);
  };

  const copyText = (text) => {
    navigator.clipboard.writeText(text).then(
      () => showToast('已複製到剪貼簿'),
      () => showToast('複製失敗')
    );
  };

  const exportAll = () => {
    const done = photos.filter(p => p.status === 'done' && p.prompt);
    if (done.length === 0) return showToast('還沒有完成的 prompt');
    const text = done.map(p => `=== ${p.name} ===\n${p.prompt}\n`).join('\n');
    const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'image_prompts.txt';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
  };

  const clearAll = () => {
    if (!confirm('清空所有圖片與 prompt？')) return;
    setPhotos([]);
  };

  return (
    <>
      <div className="section">
        <h2>1. 上傳要產生 prompt 的圖片</h2>
        <DropZone onFiles={addFiles} />
        {photos.length > 0 && (
          <div className="bar">
            <strong>共 {photos.length} 張</strong>
            <span className="spacer" />
            <button className="btn btn-danger btn-small" onClick={clearAll}>清空</button>
          </div>
        )}
      </div>

      <div className="section">
        <h2>2. 輸出設定</h2>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16, marginBottom: 14 }}>
          <div>
            <label>語言</label>
            <select value={language} onChange={e => setLanguage(e.target.value)}>
              <option value="en">英文（建議，AI 圖像模型多以英文訓練）</option>
              <option value="zh">繁體中文</option>
            </select>
          </div>
          <div>
            <label>長度</label>
            <select value={length} onChange={e => setLength(e.target.value)}>
              <option value="short">短（60–100 字）</option>
              <option value="medium">中（120–200 字）</option>
              <option value="long">長（220–350 字）</option>
            </select>
          </div>
        </div>
        <label>額外要求（可留空）</label>
        <textarea
          rows={2}
          placeholder="例如：偏電影感、加強情緒描述、不要寫人物年紀 …"
          value={extraGuidance}
          onChange={e => setExtraGuidance(e.target.value)}
        />
        <div className="field-hint">系統會自動排除真人姓名、卡通／品牌／地標等專有名詞，改用一般描述詞。</div>
      </div>

      <div className="section">
        <h2>3. 產生 Prompt</h2>
        <div className="bar">
          <button
            className="btn btn-primary btn-large"
            onClick={runAll}
            disabled={running || !apiKey || photos.length === 0}
          >
            {running ? <><span className="spinner" /> 產生中…</> : '✍️ 為所有圖片產生 Prompt'}
          </button>
          <button className="btn btn-secondary" onClick={exportAll} disabled={running}>
            ⬇ 匯出全部（.txt）
          </button>
        </div>

        {photos.length > 0 && (
          <div style={{ marginTop: 20 }}>
            {photos.map(p => (
              <div key={p.id} className="prompt-card">
                <div className="prompt-card-header">
                  <img className="prompt-card-thumb" src={p.dataURL} alt={p.name} />
                  <div style={{ flex: 1 }}>
                    <div className="prompt-card-name">{p.name}</div>
                    <div style={{ fontSize: '0.78rem', color: '#9A7F76', marginTop: 4 }}>
                      {p.status === 'pending' && '尚未產生'}
                      {p.status === 'processing' && '產生中…'}
                      {p.status === 'done' && '✓ 完成'}
                      {p.status === 'error' && `失敗：${p.error}`}
                    </div>
                  </div>
                  <button className="btn btn-danger btn-small" onClick={() => removePhoto(p.id)}>移除</button>
                </div>
                {p.prompt && (
                  <>
                    <div className="prompt-text">{p.prompt}</div>
                    <div className="prompt-actions">
                      <button className="btn btn-secondary btn-small" onClick={() => copyText(p.prompt)}>📋 複製</button>
                      <button className="btn btn-secondary btn-small" onClick={() => runOne(p.id)} disabled={running}>🔄 重做</button>
                    </div>
                  </>
                )}
                {!p.prompt && (
                  <div className="prompt-actions">
                    <button className="btn btn-secondary btn-small" onClick={() => runOne(p.id)} disabled={running}>單張產生</button>
                  </div>
                )}
              </div>
            ))}
          </div>
        )}
      </div>
    </>
  );
}

// ===== App =====
function App() {
  const [apiKey, setApiKey] = useState(() => localStorage.getItem('gemini_api_key') || '');
  const [tab, setTab] = useState('harmony');
  const [toast, setToast] = useState(null);

  const showToast = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(null), 2400);
  };

  return (
    <div className="app-container">
      <div style={{ marginBottom: 20 }}>
        <h1>🥚 EGGY 光源 / 角色 統一機</h1>
        <div className="subtitle">把不同光源的照片統一到同一個楷模色調 ・ 把跑掉的角色外觀對齊回設定 ・ 為圖片生成無專有名詞的 prompt。</div>
      </div>

      <ApiKeySection apiKey={apiKey} setApiKey={setApiKey} />

      <div className="tabs">
        <div className={`tab ${tab === 'harmony' ? 'active' : ''}`} onClick={() => setTab('harmony')}>
          🎨 統一光源
        </div>
        <div className={`tab ${tab === 'character' ? 'active' : ''}`} onClick={() => setTab('character')}>
          🧬 角色固定
        </div>
        <div className={`tab ${tab === 'prompt' ? 'active' : ''}`} onClick={() => setTab('prompt')}>
          ✍️ 圖片轉 Prompt
        </div>
      </div>

      {tab === 'harmony' && <LightHarmonyTab apiKey={apiKey} showToast={showToast} />}
      {tab === 'character' && <CharacterConsistencyTab apiKey={apiKey} showToast={showToast} />}
      {tab === 'prompt' && <PromptGeneratorTab apiKey={apiKey} showToast={showToast} />}

      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
