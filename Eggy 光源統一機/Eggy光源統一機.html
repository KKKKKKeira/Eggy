<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const IMAGE_MODELS = [
  { value: 'gemini-2.5-flash-image', label: 'Gemini 2.5 Flash Image（快、預設）' },
  { value: 'gemini-3.1-flash-image-preview', label: 'Gemini 3.1 Flash Image Preview（慢但更精準）' }
];
const TEXT_MODEL = 'gemini-2.5-flash';

// ===== Helpers =====
function readFileAsDataURL(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

function dataURLtoBase64(dataURL) {
  return dataURL.split(',')[1];
}

function uid() {
  return Math.random().toString(36).slice(2, 10);
}

function downloadBase64(base64, filename, mime = 'image/png') {
  const a = document.createElement('a');
  a.href = `data:${mime};base64,${base64}`;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

// ===== Gemini API =====
async function callGeminiImage(apiKey, parts, model = IMAGE_MODELS[0].value) {
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent`;
  const body = {
    contents: [{ parts }],
    generationConfig: { responseModalities: ['TEXT', 'IMAGE'] }
  };
  const delays = [3000, 6000, 10000, 15000, 20000];
  let lastError;
  for (let attempt = 0; attempt <= delays.length; attempt++) {
    if (attempt > 0) await new Promise(r => setTimeout(r, delays[attempt - 1]));
    try {
      const resp = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-goog-api-key': apiKey },
        body: JSON.stringify(body)
      });
      if (resp.status === 429) throw new Error('額度已用完或請求過於頻繁');
      if (resp.status === 401 || resp.status === 403) throw new Error('API Key 無效或沒有權限');
      if (resp.status >= 500) { lastError = new Error(`伺服器錯誤 ${resp.status}`); continue; }
      if (!resp.ok) {
        const t = await resp.text().catch(() => '');
        throw new Error(`API ${resp.status}: ${t.slice(0, 200)}`);
      }
      const data = await resp.json();
      const cand = data.candidates && data.candidates[0];
      if (!cand) throw new Error('沒有回傳結果');
      const imgPart = cand.content.parts.find(p => p.inlineData);
      if (!imgPart) throw new Error('回傳沒有圖片（可能被安全過濾擋下）');
      return imgPart.inlineData.data;
    } catch (err) {
      const msg = err.message || '';
      if (msg.includes('API Key') || msg.includes('額度') || msg.startsWith('API ') || msg.includes('沒有') || msg.includes('安全')) throw err;
      lastError = err;
    }
  }
  throw lastError || new Error('多次重試後仍失敗');
}

async function callGeminiText(apiKey, parts) {
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${TEXT_MODEL}:generateContent`;
  const body = {
    contents: [{ parts }],
    generationConfig: { maxOutputTokens: 16384, temperature: 0.4 }
  };
  const delays = [2000, 5000, 10000, 15000];
  let lastError;
  for (let attempt = 0; attempt <= delays.length; attempt++) {
    if (attempt > 0) await new Promise(r => setTimeout(r, delays[attempt - 1]));
    try {
      const resp = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-goog-api-key': apiKey },
        body: JSON.stringify(body)
      });
      if (resp.status === 429) throw new Error('額度已用完或請求過於頻繁');
      if (resp.status === 401 || resp.status === 403) throw new Error('API Key 無效或沒有權限');
      if (resp.status >= 500) { lastError = new Error(`伺服器錯誤 ${resp.status}`); continue; }
      if (!resp.ok) {
        const t = await resp.text().catch(() => '');
        throw new Error(`API ${resp.status}: ${t.slice(0, 200)}`);
      }
      const data = await resp.json();
      const cand = data.candidates && data.candidates[0];
      if (!cand) throw new Error('沒有回傳結果');
      const textPart = cand.content.parts.find(p => p.text);
      if (!textPart) throw new Error('回傳沒有文字');
      return textPart.text.trim();
    } catch (err) {
      const msg = err.message || '';
      if (msg.includes('API Key') || msg.includes('額度') || msg.startsWith('API ') || msg.includes('沒有')) throw err;
      lastError = err;
    }
  }
  throw lastError || new Error('多次重試後仍失敗');
}

// ===== API Key Section =====
function ApiKeySection({ apiKey, setApiKey }) {
  const [show, setShow] = useState(false);
  const [editing, setEditing] = useState(!apiKey);
  const inputRef = useRef(null);

  const save = () => {
    const v = inputRef.current.value.trim();
    if (!v) return;
    localStorage.setItem('gemini_api_key', v);
    setApiKey(v);
    setEditing(false);
  };
  const clear = () => {
    localStorage.removeItem('gemini_api_key');
    setApiKey('');
    setEditing(true);
  };

  return (
    <div className="section">
      <h2>Gemini API Key</h2>
      {editing ? (
        <div className="api-key-bar">
          <div className="api-key-input-wrap">
            <input
              ref={inputRef}
              type={show ? 'text' : 'password'}
              placeholder="貼上你的 Gemini API Key"
              defaultValue={apiKey}
              onKeyDown={e => e.key === 'Enter' && save()}
            />
            <button className="eye-toggle" onClick={() => setShow(!show)}>{show ? '🙈' : '👁'}</button>
          </div>
          <button className="btn btn-primary btn-small" onClick={save}>儲存</button>
        </div>
      ) : (
        <div className="api-key-bar">
          <span className="status-saved">✓ 已儲存（瀏覽器本機）</span>
          <button className="btn btn-secondary btn-small" onClick={() => setEditing(true)}>更換</button>
          <button className="btn btn-danger btn-small" onClick={clear}>清除</button>
        </div>
      )}
      <div className="api-hint">
        在 <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener">Google AI Studio</a> 申請；只儲存在你的瀏覽器中，不會上傳。
      </div>
    </div>
  );
}

// ===== Drop Zone =====
function DropZone({ onFiles, multiple = true, hint = '點擊或拖曳照片到這裡（可一次多張）' }) {
  const [dragging, setDragging] = useState(false);
  const inputRef = useRef(null);

  const handleFiles = (fileList) => {
    const files = Array.from(fileList).filter(f => f.type.startsWith('image/'));
    if (files.length) onFiles(files);
  };

  return (
    <>
      <div
        className={`drop-zone ${dragging ? 'dragging' : ''}`}
        onClick={() => inputRef.current.click()}
        onDragOver={e => { e.preventDefault(); setDragging(true); }}
        onDragLeave={() => setDragging(false)}
        onDrop={e => { e.preventDefault(); setDragging(false); handleFiles(e.dataTransfer.files); }}
      >
        <p><strong>＋</strong> {hint}</p>
      </div>
      <input
        ref={inputRef}
        type="file"
        accept="image/*"
        multiple={multiple}
        style={{ display: 'none' }}
        onChange={e => { handleFiles(e.target.files); e.target.value = ''; }}
      />
    </>
  );
}

// ===== Lighting profile analyzer =====
async function analyzeLightingProfile(apiKey, refPhoto) {
  const instruction = `你會看到一張圖片。任務是抽出它的「光線與色彩 DNA」量化規格，之後會用來計算色彩分級的精準變換。

請輸出**結構化文字**，每個小節格式固定。**錨點色一律附上近似 hex（用肉眼採樣即可，不需要絕對精確，但要忠實反映畫面中該素材的實際呈現色）**。

[OVERALL_LOOK]
一句話描述整體視覺調性。

[COLOR_TEMPERATURE_K]
估計的色溫，以 Kelvin 數值表示（範圍 2000–10000，例：warm 3200K / neutral 5500K / cool 8000K）。

[TINT_GREEN_MAGENTA]
green↔magenta 偏移，以 -50 到 +50 表示（負值偏綠，正值偏品紅）。

[KEY_LIGHT_DIR]
方向 + 硬度（例：soft top-front from upper-right, hard direct from camera-left, ambient flat）。

[KEY_LIGHT_COLOR_HEX]
key light 投射光的近似色 hex（例：#FFD9A8）。

[FILL_AMBIENT_COLOR_HEX]
補光／環境光投射色 hex（例：#9CB8D6）。

[ANCHOR_COLORS]（每行一個，hex 用肉眼從畫面中採樣最接近的）
- pure_white_surface_under_this_light: #XXXXXX
- mid_gray_18_percent_under_this_light: #XXXXXX
- deep_black_shadow_under_this_light: #XXXXXX
- specular_highlight_on_glossy: #XXXXXX
- caucasian_skin_midtone_under_this_light: #XXXXXX
- caucasian_skin_shadow_under_this_light: #XXXXXX
- warm_tan_brown_material_midtone: #XXXXXX
- pure_red_object_under_this_light: #XXXXXX
- pure_blue_object_under_this_light: #XXXXXX
- background_ambient_tint: #XXXXXX

（如果畫面中沒有對應素材，根據場景光線推測該素材若出現會呈現的色相。**寧可推測也不要省略 hex**。）

[TONAL_ZONES]
- shadow_color_cast_hex: #XXXXXX (陰影區整體色偏)
- midtone_color_cast_hex: #XXXXXX (中間調整體色偏)
- highlight_color_cast_hex: #XXXXXX (高光區整體色偏)

[CONTRAST]
black_point: 0–30（值越大表示黑點越被抬起、越柔）
white_point: 220–255（值越小表示高光越被壓低、越柔）
midtone_gamma: 0.7–1.4（>1 中間調更亮，<1 更暗）

[SATURATION]
global_multiplier: 0.4–1.6（1.0 為原狀）

[HSL_SHIFTS_PER_HUE]（每行：hue / hue_shift_deg / sat_mult / lum_shift；估計值）
- reds: 0 / 1.0 / 0
- oranges: 0 / 1.0 / 0
- yellows: 0 / 1.0 / 0
- greens: 0 / 1.0 / 0
- cyans: 0 / 1.0 / 0
- blues: 0 / 1.0 / 0
- magentas: 0 / 1.0 / 0
（請依畫面實況填入，不要全部都填預設值）

[FILM_RENDER_REFERENCE]
一句相似的影像 / 燈光 / 底片參考（不要提作品名 / 公司名，可以說 "Pixar-like interior soft amber"、"Kodak Portra warmth feel"、"overcast soft daylight" 等通用描述）。

嚴格規則：
- **絕對不可以描述任何畫面內容**（不要提人物、物件、場景、動作、構圖、表情、姿勢）
- 只描述光、色、調性
- 全部英文 + hex + 數值
- 直接輸出，不要前言、不要 markdown 包裝、不要 JSON
- hex 一律用大寫 6 位（例：#A8B2C0）`;
  const parts = [
    { inlineData: { mimeType: refPhoto.mime, data: refPhoto.base64 } },
    { text: instruction }
  ];
  return await callGeminiText(apiKey, parts);
}

// ===== Delta recipe computer =====
async function computeDeltaRecipe(apiKey, srcProfile, refProfile) {
  const instruction = `你是色彩分級工程師。下方有兩份結構化光線規格：FROM（來源／目前狀態）與 TO（目的地／楷模狀態）。請計算把 FROM 變到 TO 所需的精確「色彩變換配方」。

== FROM ==
"""
${srcProfile}
"""

== TO ==
"""
${refProfile}
"""

請輸出以下配方（每行純文字，hex 一律大寫 6 位）：

[WHITE_BALANCE_SHIFT_K]
從 FROM 的 Kelvin 移動到 TO 的 Kelvin 的差值（例：+2300K → 偏暖 / -1500K → 偏冷）。

[TINT_SHIFT]
green↔magenta 偏移差（例：-8 → 略偏綠）。

[TONAL_ZONE_DELTAS]（FROM hex → TO hex，列出三區）
- shadows: #XXXXXX → #XXXXXX
- midtones: #XXXXXX → #XXXXXX
- highlights: #XXXXXX → #XXXXXX

[ANCHOR_COLOR_REMAPPING]（每個錨點：FROM 中目前看到的 hex → TO 中應該變成的 hex）
- pure_white_surface: #XXXXXX → #XXXXXX
- mid_gray_18: #XXXXXX → #XXXXXX
- deep_black_shadow: #XXXXXX → #XXXXXX
- specular_highlight: #XXXXXX → #XXXXXX
- caucasian_skin_midtone: #XXXXXX → #XXXXXX
- caucasian_skin_shadow: #XXXXXX → #XXXXXX
- warm_tan_brown_material: #XXXXXX → #XXXXXX
- pure_red_object: #XXXXXX → #XXXXXX
- pure_blue_object: #XXXXXX → #XXXXXX
- background_ambient: #XXXXXX → #XXXXXX

[CONTRAST_DELTA]
black_point_shift: ±N（例 +5 把黑點抬高 5）
white_point_shift: ±N
midtone_gamma_mult: ±N（例 +0.05）

[SATURATION_DELTA]
global_multiplier_change: ±N.NN（例 +0.10 表示飽和度乘以 1.10）

[PER_HUE_SHIFTS]（每行：hue_shift_deg_delta / sat_mult_delta / lum_shift_delta）
- reds: ±0 / ±0.0 / ±0
- oranges: ±0 / ±0.0 / ±0
- yellows: ±0 / ±0.0 / ±0
- greens: ±0 / ±0.0 / ±0
- cyans: ±0 / ±0.0 / ±0
- blues: ±0 / ±0.0 / ±0
- magentas: ±0 / ±0.0 / ±0

[KEY_LIGHT_DIRECTION_NOTE]
描述要從 FROM 方向過渡到 TO 方向時，需要做的微調 re-shading 注記（例：FROM 是平光、TO 是側光，需要在右臉加溫暖高光、左側加陰影；如果方向一致則寫 "no re-shading needed"）。

[ONE_LINE_SUMMARY]
一句話總結整個變換意圖（例：cool office daylight → warm golden-hour interior, lift skin warmth, deepen amber shadows）。

嚴格規則：
- 用實際數值，不要模糊詞
- 不要描述任何畫面內容
- 不要前言、markdown 包裝、JSON
- 直接輸出小節
- 如果 FROM 和 TO 在某項已經一致，差值寫 0，不要省略`;
  const parts = [{ text: instruction }];
  return await callGeminiText(apiKey, parts);
}

// ===== Tab 1: Light Harmony =====
function LightHarmonyTab({ apiKey, showToast, imageModel }) {
  // photo: { id, name, mime, dataURL, base64, status, resultBase64?, error? }
  const [photos, setPhotos] = useState([]);
  const [referenceId, setReferenceId] = useState(null);
  const [extraInstruction, setExtraInstruction] = useState('');
  const [running, setRunning] = useState(false);
  const [lightingProfile, setLightingProfile] = useState('');
  const [profileForRefId, setProfileForRefId] = useState(null);
  const [analyzing, setAnalyzing] = useState(false);

  const addFiles = async (files) => {
    const items = await Promise.all(files.map(async f => {
      const dataURL = await readFileAsDataURL(f);
      return {
        id: uid(),
        name: f.name,
        mime: f.type || 'image/png',
        dataURL,
        base64: dataURLtoBase64(dataURL),
        status: 'pending',
      };
    }));
    setPhotos(prev => [...prev, ...items]);
    if (!referenceId && items.length > 0) {
      setReferenceId(items[0].id);
    }
  };

  const removePhoto = (id) => {
    setPhotos(prev => prev.filter(p => p.id !== id));
    if (referenceId === id) {
      const remaining = photos.filter(p => p.id !== id);
      setReferenceId(remaining.length ? remaining[0].id : null);
      setLightingProfile('');
      setProfileForRefId(null);
    }
  };

  const reference = photos.find(p => p.id === referenceId);
  const targets = photos.filter(p => p.id !== referenceId);
  const profileStale = reference && profileForRefId && profileForRefId !== referenceId;

  const analyze = async () => {
    if (!apiKey) return showToast('請先設定 API Key');
    if (!reference) return showToast('請先指定一張楷模圖');
    setAnalyzing(true);
    try {
      const text = await analyzeLightingProfile(apiKey, reference);
      setLightingProfile(text);
      setProfileForRefId(reference.id);
    } catch (err) {
      showToast('分析失敗：' + (err.message || '未知錯誤'));
    }
    setAnalyzing(false);
  };

  const buildApplyPrompt = (refProfile, srcProfile, deltaRecipe) => {
    let p = `你是高精度色彩分級引擎。你會收到一張「目標圖」（已拍好的母片），任務是執行下方「色彩變換配方」(DELTA RECIPE) 把它從 FROM 狀態變到 TO 狀態。

== DELTA RECIPE（這是最重要的部分，請逐項執行）==
"""
${deltaRecipe || '（沒有提供配方，請自行根據 FROM 與 TO 計算差值並套用）'}
"""

== FROM（目標圖目前的光線色彩狀態）==
"""
${srcProfile || '（未提供）'}
"""

== TO（楷模光線色彩狀態）==
"""
${refProfile}
"""

== 執行原則 ==
1. **嚴格依照 DELTA RECIPE 的數值**做色彩變換。配方裡的 ANCHOR_COLOR_REMAPPING 是最關鍵的：把目標圖中每一塊素材的呈現色，從 FROM 的 hex 平移到 TO 的 hex。例如配方寫 "pure_white_surface: #C8D4E0 → #F5E8D2"，那目標圖裡所有看起來是 #C8D4E0 附近的白色素材，都要被映射到 #F5E8D2 附近。
2. 套用 WHITE_BALANCE_SHIFT_K（色溫位移）、TINT_SHIFT（綠紫偏移）、CONTRAST_DELTA、SATURATION_DELTA、PER_HUE_SHIFTS 的數值變換。
3. 套用 TONAL_ZONE_DELTAS：依照三區（shadows / midtones / highlights）各自的 hex 變換。
4. KEY_LIGHT_DIRECTION_NOTE 如果有提到要 re-shade，做最小幅度的明暗重新分布以對齊光向感，但**絕對不要改變主體形狀、位置或內容**。
5. 重點：不是把整張圖蓋上 TO 的色相，是執行 FROM → TO 的 delta，所以最終結果取決於目標圖原本的素材色，而不是 TO 的描述。

== 必須像素級保留（不可以變動）==
- 主體身份、人物五官比例、表情、姿勢、肢體位置、視線方向
- 服裝樣式、配件、毛髮形狀與輪廓、物件形狀與位置
- 構圖、鏡頭視角、景別、長寬比、解析度
- 背景元素的位置與形狀
- 畫面中的文字
- 整體繪畫風格（不要把 3D 卡通變成寫實照片，也不要反過來）

== 嚴格禁止 ==
- 新增、移除、移動、變形、合成、塗抹、修補任何物件或元素
- 加入新角色、新道具、新背景、新文字
- 改變人物身份或表情、改變動作、改變視角
- 把 FROM / TO / RECIPE 描述中的詞彙當作要「畫進畫面」的東西（那是調光指令，不是內容）

== 允許做的事（且只能做這些）==
- 白平衡 / 色溫 / Tint
- 色彩平衡 (Color Balance) 對 shadows / midtones / highlights 三區
- 曲線 (Curves) / 色階 (Levels) / Black & White Points
- HSL 對個別色相的 hue / saturation / luminance 微調
- 全域 saturation / contrast
- 細微的明暗 re-shading 以對齊 KEY LIGHT 方向感（不改形狀）

再次強調：這是一次依照 DELTA RECIPE 執行的精準色彩變換，不是重新生成畫面。輸出尺寸與長寬比與目標圖一致。`;
    if (extraInstruction.trim()) {
      p += `\n\n額外微調指示：${extraInstruction.trim()}`;
    }
    return p;
  };

  const updatePhoto = (id, patch) => {
    setPhotos(prev => prev.map(p => p.id === id ? { ...p, ...patch } : p));
  };

  const runOne = async (id, profileOverride) => {
    if (!apiKey) return showToast('請先設定 API Key');
    const profile = profileOverride !== undefined ? profileOverride : lightingProfile;
    if (!profile.trim()) return showToast('請先分析或填入色調規格');
    const t = photos.find(p => p.id === id);
    if (!t) return;
    updatePhoto(id, { status: 'analyzing', error: null });
    try {
      let srcProfile = t.sourceProfile;
      if (!srcProfile) {
        srcProfile = await analyzeLightingProfile(apiKey, t);
        updatePhoto(id, { sourceProfile: srcProfile });
      }
      updatePhoto(id, { status: 'computing', deltaRecipe: null });
      const recipe = await computeDeltaRecipe(apiKey, srcProfile, profile);
      updatePhoto(id, { deltaRecipe: recipe, status: 'processing' });
      const parts = [
        { inlineData: { mimeType: t.mime, data: t.base64 } },
        { text: buildApplyPrompt(profile, srcProfile, recipe) }
      ];
      const result = await callGeminiImage(apiKey, parts, imageModel);
      updatePhoto(id, { status: 'done', resultBase64: result });
    } catch (err) {
      updatePhoto(id, { status: 'error', error: err.message || '未知錯誤' });
    }
  };

  const runHarmonize = async () => {
    if (!apiKey) return showToast('請先設定 API Key');
    if (!reference) return showToast('請先指定一張楷模圖');
    if (targets.length === 0) return showToast('至少需要一張目標圖');
    setRunning(true);
    let profile = lightingProfile;
    if (!profile.trim() || profileForRefId !== referenceId) {
      try {
        profile = await analyzeLightingProfile(apiKey, reference);
        setLightingProfile(profile);
        setProfileForRefId(reference.id);
      } catch (err) {
        showToast('分析楷模光線失敗：' + (err.message || '未知錯誤'));
        setRunning(false);
        return;
      }
    }
    for (const t of targets) {
      try {
        updatePhoto(t.id, { status: 'analyzing', error: null });
        let srcProfile = t.sourceProfile;
        if (!srcProfile) {
          srcProfile = await analyzeLightingProfile(apiKey, t);
          updatePhoto(t.id, { sourceProfile: srcProfile });
        }
        updatePhoto(t.id, { status: 'computing' });
        const recipe = await computeDeltaRecipe(apiKey, srcProfile, profile);
        updatePhoto(t.id, { deltaRecipe: recipe, status: 'processing' });
        const parts = [
          { inlineData: { mimeType: t.mime, data: t.base64 } },
          { text: buildApplyPrompt(profile, srcProfile, recipe) }
        ];
        const result = await callGeminiImage(apiKey, parts, imageModel);
        updatePhoto(t.id, { status: 'done', resultBase64: result });
      } catch (err) {
        updatePhoto(t.id, { status: 'error', error: err.message || '未知錯誤' });
      }
    }
    setRunning(false);
  };

  const downloadAll = async () => {
    const done = photos.filter(p => p.status === 'done' && p.resultBase64);
    if (done.length === 0) return showToast('還沒有完成的結果');
    const zip = new JSZip();
    done.forEach(p => {
      const baseName = p.name.replace(/\.[^.]+$/, '');
      zip.file(`harmonized_${baseName}.png`, p.resultBase64, { base64: true });
    });
    const blob = await zip.generateAsync({ type: 'blob' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'harmonized_photos.zip';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  const clearAll = () => {
    if (!confirm('清空所有照片？')) return;
    setPhotos([]); setReferenceId(null);
  };

  return (
    <>
      <div className="section">
        <h2>1. 上傳要統一光源的照片</h2>
        <p className="subtitle">先放楷模圖、再放需要調整的圖。也可以拖曳多張一次上傳。</p>
        <DropZone onFiles={addFiles} />
        {photos.length > 0 && (
          <>
            <div className="bar">
              <strong>共 {photos.length} 張</strong>
              <span className="spacer" />
              <button className="btn btn-danger btn-small" onClick={clearAll}>清空</button>
            </div>
            <div className="img-grid">
              {photos.map(p => (
                <div key={p.id} className={`img-card ${p.id === referenceId ? 'reference' : ''}`}>
                  <img src={p.dataURL} alt={p.name} />
                  {p.id === referenceId && <span className="ref-badge">楷模</span>}
                  {p.id !== referenceId && p.status !== 'pending' && (
                    <span className={`status-pill ${p.status === 'analyzing' || p.status === 'computing' ? 'processing' : p.status}`}>
                      {p.status === 'analyzing' ? '分析現況' : p.status === 'computing' ? '算配方' : p.status === 'processing' ? '調色中' : p.status === 'done' ? '完成' : p.status === 'error' ? '失敗' : ''}
                    </span>
                  )}
                  <div className="img-card-body">
                    <div className="img-card-name">{p.name}</div>
                    <div className="img-card-actions">
                      {p.id !== referenceId && (
                        <button className="btn btn-secondary btn-small" onClick={() => setReferenceId(p.id)}>設為楷模</button>
                      )}
                      <button className="btn btn-danger btn-small" onClick={() => removePhoto(p.id)}>移除</button>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </>
        )}
      </div>

      <div className="section">
        <h2>2. 楷模光線分析（色調規格）</h2>
        <p className="subtitle">
          抽出楷模的「光線 DNA」量化規格（色溫 K、tint、ANCHOR COLORS 含 hex、tonal zones、HSL shifts…）。每張目標圖在被處理前還會單獨被分析一次「目前的光線狀態」，再由 AI 算出 FROM → TO 的精確 delta 配方，最後才執行調色 —— 讓不同起點的圖最終都能對齊到同一個目的地。
          <br />
          <span style={{ color: '#7A5C50' }}>⚠ 仍是 AI 色彩分級而非物理級重打光。錨點 hex 是估值，建議在框內補上物件級錨點（例如「product cream coat fabric should always read as #EFE6D8 under target light」），結果會更穩。</span>
          {profileStale && <span style={{ color: '#B85C00', fontWeight: 600 }}><br />⚠ 楷模圖已換，建議重新分析</span>}
        </p>
        <div className="bar" style={{ marginTop: 0, marginBottom: 12 }}>
          <button
            className="btn btn-secondary"
            onClick={analyze}
            disabled={analyzing || !apiKey || !reference}
          >
            {analyzing ? <><span className="spinner" style={{ borderTopColor: '#A81C2B', borderColor: 'rgba(168,28,43,0.3)' }} /> 分析中…</> : (lightingProfile ? '🔄 重新分析楷模光線' : '🔍 分析楷模光線')}
          </button>
          {lightingProfile && <span className="status-saved">✓ 已分析</span>}
        </div>
        <textarea
          rows={6}
          placeholder="按上方按鈕讓 AI 自動分析楷模圖的光線色彩特徵；也可以在這裡手動撰寫或編輯。直接按下方「統一所有照片光源」也會自動先分析。"
          value={lightingProfile}
          onChange={e => setLightingProfile(e.target.value)}
        />
        <div className="field-hint">內容只描述色溫、光線方向、陰影、色調等，不會描述畫面內容。可以自由編輯／覆蓋。</div>
      </div>

      <div className="section">
        <h2>3. 額外指示（可留空）</h2>
        <textarea
          rows={2}
          placeholder="例如：保留人物膚色不要過度泛黃、輕微提高陰影細節 …"
          value={extraInstruction}
          onChange={e => setExtraInstruction(e.target.value)}
        />
        <div className="field-hint">這段文字會附加到調光指令裡。</div>
      </div>

      <div className="section">
        <h2>4. 開始統一光源</h2>
        <div className="bar">
          <button

            onClick={runHarmonize}
            disabled={running || !apiKey || !reference || targets.length === 0}
          >
            {running ? <><span className="spinner" /> 處理中…</> : '🎨 統一所有照片光源'}
          </button>
          <button className="btn btn-secondary" onClick={downloadAll} disabled={running}>
            ⬇ 下載全部結果（.zip）
          </button>
        </div>

        {targets.some(t => t.resultBase64 || t.deltaRecipe || t.status === 'error') && (
          <div style={{ marginTop: 24 }}>
            <h2 style={{ marginBottom: 12 }}>對比結果</h2>
            {targets.filter(t => t.resultBase64 || t.status === 'error' || t.deltaRecipe).map(t => (
              <div key={t.id}>
                <div className="compare-row">
                  <div className="compare-col">
                    <div className="compare-label">原圖：{t.name}</div>
                    <img src={t.dataURL} alt="原圖" />
                  </div>
                  <div className="compare-col">
                    <div className="compare-label">
                      {t.status === 'error' ? `失敗：${t.error}` : '統一後'}
                    </div>
                    {t.resultBase64 ? (
                      <>
                        <img src={`data:image/png;base64,${t.resultBase64}`} alt="結果" />
                        <div style={{ marginTop: 8, display: 'flex', gap: 8, justifyContent: 'center' }}>
                          <button
                            className="btn btn-secondary btn-small"

                          <button
                            className="btn btn-secondary btn-small"

                      </>
                    ) : (
                      <button
                        className="btn btn-secondary btn-small"
                        onClick={() => runOne(t.id)}

                    <summary style={{ cursor: 'pointer', fontSize: '0.82rem', color: '#7A5C50', fontWeight: 600 }}>
                      🔬 看調色細節（FROM 規格 / Delta 配方）
                    </summary>
                    {t.sourceProfile && (
                      <div style={{ marginTop: 10 }}>
                        <div style={{ fontSize: '0.78rem', color: '#A81C2B', fontWeight: 700, marginBottom: 4 }}>FROM（這張圖目前的光線狀態）</div>
                        <pre style={{ fontSize: '0.72rem', whiteSpace: 'pre-wrap', wordBreak: 'break-word', background: '#fff', padding: 8, borderRadius: 6, border: '1px solid #EDE0D6', maxHeight: 200, overflow: 'auto' }}>{t.sourceProfile}</pre>
                      </div>
                    )}
                    {t.deltaRecipe && (
                      <div style={{ marginTop: 10 }}>
                        <div style={{ fontSize: '0.78rem', color: '#A81C2B', fontWeight: 700, marginBottom: 4 }}>DELTA RECIPE（FROM → TO 變換配方）</div>
                        <pre style={{ fontSize: '0.72rem', whiteSpace: 'pre-wrap', wordBreak: 'break-word', background: '#fff', padding: 8, borderRadius: 6, border: '1px solid #EDE0D6', maxHeight: 240, overflow: 'auto' }}>{t.deltaRecipe}</pre>
                      </div>
                    )}
                  </details>
                )}
              </div>
            ))}
          </div>
        )}
      </div>
    </>
  );
}

// ===== Tab 2: Character Consistency =====
function CharacterConsistencyTab({ apiKey, showToast, imageModel }) {

嚴格規則：

  const buildFixPrompt = () => {

1. 數張「角色設定參考圖」（canonical character reference）

    if (extraInstruction.trim()) {

        <div className="bar">

                <div className="compare-col">

                </div>
                <div className="compare-col">
                  <div className="compare-label">
                    {t.status === 'error' ? `失敗：${t.error}` : '修正後'}
                  </div>
                  {t.resultBase64 ? (

                      <img src={`data:image/png;base64,${t.resultBase64}`} alt="結果" />
                      <div style={{ marginTop: 8, display: 'flex', gap: 8, justifyContent: 'center' }}>

  );

**【輸出規則】**
- 不要前言、不要結論、不要 markdown 包裝、不要編號、不要引號、不要在開頭寫 "Prompt:" 之類的標籤
- 直接輸出 prompt 本身${isExhaustive ? '（含小節標題用方括號 [SECTION]，每節下方是描述文字）' : '（單一段落）'}
- 寧可長不可短：最高指導原則是「視覺重現度」

${extraGuidance.trim() ? '【使用者額外要求】\n' + extraGuidance.trim() : ''}`;
  };

  const runOne = async (id) => {
    if (!apiKey) return showToast('請先設定 API Key');
    const p = photos.find(x => x.id === id);
    if (!p) return;
    updatePhoto(id, { status: 'processing', error: null });
    try {
      const parts = [
        { inlineData: { mimeType: p.mime, data: p.base64 } },
        { text: buildInstruction() }
      ];
      const text = await callGeminiText(apiKey, parts);
      updatePhoto(id, { status: 'done', prompt: text });
    } catch (err) {
      updatePhoto(id, { status: 'error', error: err.message || '未知錯誤' });
    }
  };

  const runAll = async () => {
    if (!apiKey) return showToast('請先設定 API Key');
    if (photos.length === 0) return showToast('請先上傳圖片');
    setRunning(true);
    const instruction = buildInstruction();
    for (const p of photos) {
      if (p.status === 'done') continue;
      updatePhoto(p.id, { status: 'processing', error: null });
      try {
        const parts = [
          { inlineData: { mimeType: p.mime, data: p.base64 } },
          { text: instruction }
        ];
        const text = await callGeminiText(apiKey, parts);
        updatePhoto(p.id, { status: 'done', prompt: text });
      } catch (err) {
        updatePhoto(p.id, { status: 'error', error: err.message || '未知錯誤' });
      }
    }
    setRunning(false);
  };

  const copyText = (text) => {
    navigator.clipboard.writeText(text).then(
      () => showToast('已複製到剪貼簿'),
      () => showToast('複製失敗')
    );
  };

  const exportAll = () => {
    const done = photos.filter(p => p.status === 'done' && p.prompt);
    if (done.length === 0) return showToast('還沒有完成的 prompt');
    const text = done.map(p => `=== ${p.name} ===\n${p.prompt}\n`).join('\n');
    const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'image_prompts.txt';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
  };

  const clearAll = () => {
    if (!confirm('清空所有圖片與 prompt？')) return;
    setPhotos([]);
  };

  return (
    <>
      <div className="section">
        <h2>1. 上傳要產生 prompt 的圖片</h2>
        <DropZone onFiles={addFiles} />
        {photos.length > 0 && (
          <div className="bar">
            <strong>共 {photos.length} 張</strong>
            <span className="spacer" />
            <button className="btn btn-danger btn-small" onClick={clearAll}>清空</button>
          </div>
        )}
      </div>

      <div className="section">
        <h2>2. 輸出設定</h2>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16, marginBottom: 14 }}>
          <div>
            <label>語言</label>
            <select value={language} onChange={e => setLanguage(e.target.value)}>
              <option value="en">英文（建議，AI 圖像模型多以英文訓練）</option>
              <option value="zh">繁體中文</option>
            </select>
          </div>
          <div>
            <label>詳盡度</label>
            <select value={detailLevel} onChange={e => setDetailLevel(e.target.value)}>
              <option value="exhaustive">🔬 極致詳盡（建議，無字數限制，分小節描述每個細節）</option>
              <option value="detailed">詳細（單段約 400–700 字）</option>
              <option value="standard">標準（單段約 150–250 字）</option>
            </select>
          </div>
        </div>
        <label>額外要求（可留空）</label>
        <textarea
          rows={2}
          placeholder="例如：偏電影感、加強情緒描述、不要寫人物年紀 …"
          value={extraGuidance}
          onChange={e => setExtraGuidance(e.target.value)}
        />
        <div className="field-hint">系統會自動排除真人姓名、卡通／品牌／地標等專有名詞，改用一般描述詞。極致詳盡模式會輸出長段結構化描述（[STYLE]、[SUBJECT]、[LIGHTING] …），目標是讓他人僅憑 prompt 重現幾乎一模一樣的圖。</div>
      </div>

      <div className="section">
        <h2>3. 產生 Prompt</h2>
        <div className="bar">
          <button
            className="btn btn-primary btn-large"
            onClick={runAll}
            disabled={running || !apiKey || photos.length === 0}
          >
            {running ? <><span className="spinner" /> 產生中…</> : '✍️ 為所有圖片產生 Prompt'}
          </button>
          <button className="btn btn-secondary" onClick={exportAll} disabled={running}>
            ⬇ 匯出全部（.txt）
          </button>
        </div>

        {photos.length > 0 && (
          <div style={{ marginTop: 20 }}>
            {photos.map(p => (
              <div key={p.id} className="prompt-card">
                <div className="prompt-card-header">
                  <img className="prompt-card-thumb" src={p.dataURL} alt={p.name} />
                  <div style={{ flex: 1 }}>
                    <div className="prompt-card-name">{p.name}</div>
                    <div style={{ fontSize: '0.78rem', color: '#9A7F76', marginTop: 4 }}>
                      {p.status === 'pending' && '尚未產生'}
                      {p.status === 'processing' && '產生中…'}
                      {p.status === 'done' && '✓ 完成'}
                      {p.status === 'error' && `失敗：${p.error}`}
                    </div>
                  </div>
                  <button className="btn btn-danger btn-small" onClick={() => removePhoto(p.id)}>移除</button>
                </div>
                {p.prompt && (
                  <>
                    <div className="prompt-text">{p.prompt}</div>
                    <div className="prompt-actions">
                      <button className="btn btn-secondary btn-small" onClick={() => copyText(p.prompt)}>📋 複製</button>
                      <button className="btn btn-secondary btn-small" onClick={() => runOne(p.id)} disabled={running}>🔄 重做</button>
                    </div>
                  </>
                )}
                {!p.prompt && (
                  <div className="prompt-actions">
                    <button className="btn btn-secondary btn-small" onClick={() => runOne(p.id)} disabled={running}>單張產生</button>
                  </div>
                )}
              </div>
            ))}
          </div>
        )}
      </div>
    </>
  );
}

// ===== App =====
function App() {
  const [apiKey, setApiKey] = useState(() => localStorage.getItem('gemini_api_key') || '');
  const [tab, setTab] = useState('harmony');
  const [toast, setToast] = useState(null);
  const [imageModel, setImageModel] = useState(() => localStorage.getItem('gemini_image_model') || IMAGE_MODELS[0].value);

  const updateImageModel = (v) => {
    setImageModel(v);
    localStorage.setItem('gemini_image_model', v);
  };

  const showToast = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(null), 2400);
  };

  return (
    <div className="app-container">
      <div style={{ marginBottom: 20 }}>
        <h1>🥚 EGGY 光源 / 角色 統一機</h1>
        <div className="subtitle">把不同光源的照片統一到同一個楷模色調 ・ 把跑掉的角色外觀對齊回設定 ・ 為圖片生成無專有名詞的 prompt。</div>
      </div>

      <ApiKeySection apiKey={apiKey} setApiKey={setApiKey} />

      <div className="section" style={{ padding: '14px 24px' }}>
        <div style={{ display: 'flex', gap: 14, alignItems: 'center', flexWrap: 'wrap' }}>
          <label style={{ marginBottom: 0, whiteSpace: 'nowrap' }}>圖像模型</label>
          <select
            value={imageModel}
            onChange={e => updateImageModel(e.target.value)}
            style={{ flex: 1, minWidth: 280 }}
          >
            {IMAGE_MODELS.map(m => <option key={m.value} value={m.value}>{m.label}</option>)}
          </select>
        </div>
        <div className="field-hint">3.1 Preview 比較貴與慢，但色彩控制較精準；偶爾不穩可切回 2.5。</div>
      </div>

      <div className="tabs">
        <div className={`tab ${tab === 'harmony' ? 'active' : ''}`} onClick={() => setTab('harmony')}>
          🎨 統一光源
        </div>
        <div className={`tab ${tab === 'character' ? 'active' : ''}`} onClick={() => setTab('character')}>
          🧬 角色固定
        </div>
        <div className={`tab ${tab === 'prompt' ? 'active' : ''}`} onClick={() => setTab('prompt')}>
          ✍️ 圖片轉 Prompt
        </div>
      </div>

      {tab === 'harmony' && <LightHarmonyTab apiKey={apiKey} showToast={showToast} imageModel={imageModel} />}
      {tab === 'character' && <CharacterConsistencyTab apiKey={apiKey} showToast={showToast} imageModel={imageModel} />}
      {tab === 'prompt' && <PromptGeneratorTab apiKey={apiKey} showToast={showToast} />}

      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
