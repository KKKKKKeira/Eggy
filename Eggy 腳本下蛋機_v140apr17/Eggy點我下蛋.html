<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EGGY 腳本下蛋機</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>

<style>
/* ── THEME: Warm Editorial ─────────────────────────────────────
   BG:      #F4EDE4  (warm cream)
   Surface: #FBF8F5  (off-white card)
   Red:     #A81C2B  (primary crimson)
   Text:    #1C1410  (dark brown-black)
   Border:  #E5D5C8  (warm beige)
──────────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #F4EDE4; color: #1C1410; line-height: 1.6;
}
.app-container { max-width: 1100px; margin: 0 auto; padding: 20px; }
h1 {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 2rem; font-weight: 800; color: #1C1410;
}
h2 {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 1.2rem; font-weight: 700; margin-bottom: 12px; color: #1C1410;
}
.section {
  background: #FBF8F5; border-radius: 12px; padding: 24px;
  margin-bottom: 20px; box-shadow: 0 1px 6px rgba(28,20,16,0.06);
  border: 1px solid #EDE0D6;
}
.section-header {
  display: flex; align-items: center; justify-content: space-between;
  cursor: pointer; user-select: none;
}
.section-header h2 { margin-bottom: 0; }
.collapse-icon { font-size: 1.2rem; transition: transform 0.2s; color: #A81C2B; }
.collapse-icon.open { transform: rotate(180deg); }

/* Form elements */
label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 4px; color: #3D2B23; }
input[type="text"], input[type="password"], textarea, select {
  width: 100%; padding: 10px 12px; border: 1.5px solid #E5D5C8; border-radius: 8px;
  font-size: 0.95rem; font-family: inherit; transition: border-color 0.2s;
  background: #FBF8F5; color: #1C1410;
}
input:focus, textarea:focus, select:focus {
  outline: none; border-color: #A81C2B;
  box-shadow: 0 0 0 3px rgba(168,28,43,0.1);
}
textarea { resize: vertical; }
.field-hint { font-size: 0.78rem; color: #9A7F76; margin-top: 2px; }
.form-row { margin-bottom: 14px; }
.form-row-inline { display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-end; }
.form-row-inline > div { flex: 1; min-width: 160px; }

/* Buttons */
.btn {
  display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px;
  border: 1.5px solid transparent; border-radius: 8px; font-size: 0.95rem; font-weight: 600;
  cursor: pointer; transition: all 0.2s; font-family: inherit;
}
.btn-primary { background: #A81C2B; color: #fff; border-color: #A81C2B; }
.btn-primary:hover { background: #8B1522; border-color: #8B1522; }
.btn-primary:disabled { background: #D4899A; border-color: #D4899A; cursor: not-allowed; }
.btn-secondary { background: #FBF8F5; color: #1C1410; border-color: #D5C5BC; }
.btn-secondary:hover { background: #F4EDE4; border-color: #A81C2B; color: #A81C2B; }
.btn-danger { background: #FDF0F1; color: #A81C2B; border-color: #E5C5CA; }
.btn-danger:hover { background: #FADEDF; border-color: #A81C2B; }
.btn-success { background: #EAF5EC; color: #2D6A35; border-color: #B8DFC0; }
.btn-success:hover { background: #D4ECDA; }
.btn-small { padding: 6px 12px; font-size: 0.82rem; }
.btn-large { padding: 14px 32px; font-size: 1.05rem; letter-spacing: 0.02em; }

/* API Key section */
.api-key-bar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.api-key-input-wrap { position: relative; flex: 1; min-width: 250px; }
.api-key-input-wrap input { padding-right: 40px; }
.eye-toggle {
  position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
  background: none; border: none; cursor: pointer; font-size: 1.1rem; color: #9A7F76;
}
.status-saved { color: #2D6A35; font-size: 0.85rem; font-weight: 600; }
.status-warning { color: #B85C00; font-size: 0.85rem; font-weight: 600; }
.api-hint { font-size: 0.8rem; color: #9A7F76; margin-top: 8px; }
.api-hint a { color: #A81C2B; text-decoration: none; }
.api-hint a:hover { text-decoration: underline; }

/* Top settings bar */
.settings-bar { display: flex; gap: 16px; flex-wrap: wrap; }
.settings-bar > div { flex: 1; min-width: 150px; }

/* Cards */
.card {
  background: #F7F2EE; border: 1.5px solid #EDE0D6; border-radius: 10px;
  padding: 18px; margin-bottom: 14px; position: relative;
  transition: box-shadow 0.2s, border-color 0.2s;
  animation: fadeIn 0.3s ease;
}
.card:hover { box-shadow: 0 2px 10px rgba(168,28,43,0.07); border-color: #D5C5BC; }
.card-error { border-color: #A81C2B; }
.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.card-number {
  display: inline-flex; align-items: center; justify-content: center;
  width: 32px; height: 32px; border-radius: 50%;
  background: #A81C2B; color: #fff; font-weight: 700; font-size: 0.85rem;
}
.delete-card-btn {
  background: none; border: none; cursor: pointer; font-size: 1.3rem;
  color: #C4ADA5; transition: color 0.2s;
}
.delete-card-btn:hover { color: #A81C2B; }
.add-card-btn {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  width: 100%; padding: 12px; border: 2px dashed #D5C5BC; border-radius: 10px;
  background: transparent; font-size: 0.95rem; color: #9A7F76; cursor: pointer;
  transition: all 0.2s; font-family: inherit;
}
.add-card-btn:hover { border-color: #A81C2B; color: #A81C2B; background: #FDF0F1; }

/* Drag handle */
.drag-handle { cursor: grab; font-size: 1.2rem; color: #C4ADA5; margin-right: 8px; user-select: none; }
.drag-handle:active { cursor: grabbing; }
.card.dragging { opacity: 0.5; border-style: dashed; }
.card.drag-over { border-color: #A81C2B; border-style: dashed; background: #FDF0F1; }

/* Progress */
.progress-list { margin: 16px 0; }
.progress-item {
  display: flex; align-items: center; gap: 10px; padding: 8px 12px;
  border-radius: 6px; margin-bottom: 4px; font-size: 0.9rem; font-family: monospace;
}
.progress-item.done { background: #EAF5EC; color: #2D6A35; }
.progress-item.running { background: #FDF0F1; color: #A81C2B; }
.progress-item.waiting { background: #F4EDE4; color: #9A7F76; }
.progress-item.error { background: #FADEDF; color: #8B1522; }

/* Output grid */
.output-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; margin-top: 20px; }
.output-card {
  background: #FBF8F5; border-radius: 12px; overflow: hidden;
  box-shadow: 0 2px 8px rgba(28,20,16,0.08); transition: box-shadow 0.2s;
  border: 1px solid #EDE0D6;
}
.output-card:hover { box-shadow: 0 4px 18px rgba(168,28,43,0.1); }
.output-card img { width: 100%; display: block; cursor: pointer; }
.output-card-body { padding: 14px; }
.output-card-title { font-weight: 700; margin-bottom: 6px; color: #1C1410; }
.output-card-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
.prompt-preview {
  max-height: 0; overflow: hidden; transition: max-height 0.3s;
  font-size: 0.8rem; background: #F4EDE4; border-radius: 6px; margin-top: 8px;
}
.prompt-preview.open { max-height: 600px; padding: 10px; overflow-y: auto; }
.prompt-preview pre { white-space: pre-wrap; word-break: break-word; }

/* Version history */
.version-history { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
.version-thumb {
  width: 80px; border-radius: 6px; overflow: hidden; cursor: pointer;
  border: 2px solid transparent; position: relative; transition: border-color 0.2s;
}
.version-thumb.selected { border-color: #A81C2B; }
.version-thumb img { width: 100%; display: block; }
.version-label {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: rgba(28,20,16,0.65); color: #fff; font-size: 0.65rem;
  text-align: center; padding: 2px;
}
.version-note { font-size: 0.75rem; color: #9A7F76; margin-top: 4px; }

/* Inpaint modal */
.inpaint-canvas-area { position: relative; margin-bottom: 6px; }
.inpaint-canvas-area canvas { display: block; width: 100%; border-radius: 8px; border: 1.5px solid #E5D5C8; cursor: crosshair; user-select: none; touch-action: none; }
.inpaint-canvas-loading { padding: 40px; text-align: center; color: #C4ADA5; border: 1.5px solid #E5D5C8; border-radius: 8px; margin-bottom: 6px; }
.inpaint-hint { font-size: 0.82rem; padding: 4px 0 10px; color: #9A7F76; }
.inpaint-hint.has-sel { color: #2D6A35; }
.revision-area {
  margin-top: 10px; padding: 12px; background: #F7F2EE;
  border-radius: 8px; border: 1px solid #EDE0D6;
  animation: fadeIn 0.3s ease;
}
.gen-count { font-size: 0.75rem; color: #9A7F76; margin-top: 4px; }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(28,20,16,0.65);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000; animation: fadeIn 0.2s ease;
}
.modal-content {
  background: #FBF8F5; border-radius: 14px; padding: 24px;
  max-width: 800px; width: 90%; max-height: 85vh; overflow-y: auto;
  position: relative; border: 1px solid #EDE0D6;
}
.modal-close {
  position: absolute; top: 12px; right: 16px; background: none;
  border: none; font-size: 1.5rem; cursor: pointer; color: #9A7F76;
}
.modal-close:hover { color: #A81C2B; }
.modal-content pre {
  white-space: pre-wrap; word-break: break-word; background: #F4EDE4;
  padding: 16px; border-radius: 8px; font-size: 0.85rem; line-height: 1.5;
}

/* Newsletter */
.newsletter-wrap {
  background: rgba(255,255,255,0.15); border-radius: 14px; padding: 28px 32px;
  max-width: 520px; margin: 0 auto 36px; border: 1.5px solid rgba(255,255,255,0.3);
}
.newsletter-wrap h3 {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 1.3rem; font-weight: 700; color: #fff; margin-bottom: 6px;
}
.newsletter-wrap p { font-size: 0.85rem; color: rgba(255,255,255,0.8); margin-bottom: 14px; }
.newsletter-row { display: flex; gap: 8px; }
.newsletter-row input {
  flex: 1; padding: 10px 14px; border: 1.5px solid rgba(255,255,255,0.4); border-radius: 8px;
  font-size: 0.9rem; font-family: inherit; background: rgba(255,255,255,0.9); color: #1C1410;
}
.newsletter-row input:focus { outline: none; border-color: #fff; box-shadow: 0 0 0 3px rgba(255,255,255,0.2); }
.newsletter-success { background: rgba(255,255,255,0.2); color: #fff; padding: 10px 16px; border-radius: 8px; font-size: 0.9rem; font-weight: 600; }
.newsletter-error { font-size: 0.8rem; color: rgba(255,255,255,0.9); margin-top: 6px; }

/* Header */
.app-header {
  background: #A81C2B; color: #fff;
  text-align: center; padding: 36px 24px 28px; width: 100%;
}
.app-header h1 { color: #fff; margin-bottom: 6px; }
.app-header p { color: rgba(255,255,255,0.8); font-size: 0.9rem; }
.app-header .version-badge {
  background: rgba(255,180,196,0.3); color: #FFD4DC;
}

/* Footer */
.app-footer {
  background: #A81C2B; color: rgba(255,255,255,0.8);
  padding: 56px 24px 40px; margin-top: 32px; text-align: center; line-height: 2;
  width: 100%; box-sizing: border-box;
}
.app-footer a { color: #fff; text-decoration: none; }
.app-footer a:hover { color: rgba(255,255,255,0.75); text-decoration: underline; }
.footer-dev-name {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 2.4rem; font-weight: 800; color: #fff; letter-spacing: 0.02em;
  margin: 8px 0 4px;
}
.footer-label { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.14em; color: rgba(255,255,255,0.6); font-weight: 700; margin-bottom: 2px; }
.footer-divider { width: 40px; height: 3px; background: rgba(255,255,255,0.4); border-radius: 2px; margin: 20px auto; }
.footer-contact { font-size: 0.9rem; color: rgba(255,255,255,0.85); }
.footer-disclaimer { font-size: 0.78rem; color: rgba(255,255,255,0.6); margin-top: 2px; font-style: italic; line-height: 1.6; }
.version-badge {
  display: inline-block; background: rgba(255,255,255,0.2); color: #fff;
  border-radius: 20px; padding: 2px 12px; font-size: 0.75rem; font-weight: 600;
}

/* Onboarding */
.onboarding-wrap {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, #F4EDE4 0%, #FADEDF 100%); padding: 24px;
}
.onboarding-card {
  background: #FBF8F5; border-radius: 20px; padding: 40px 36px;
  max-width: 560px; width: 100%;
  box-shadow: 0 12px 40px rgba(168,28,43,0.12); border: 1px solid #EDE0D6;
}
.onboarding-step {
  display: flex; gap: 16px; align-items: flex-start;
  background: #F4EDE4; border-radius: 12px; padding: 16px; margin-bottom: 12px;
}
.onboarding-step-num {
  min-width: 32px; height: 32px; border-radius: 50%;
  background: #A81C2B; color: #fff; display: flex; align-items: center;
  justify-content: center; font-weight: 700; font-size: 0.9rem; flex-shrink: 0;
}
.onboarding-warning {
  background: #FDF5E6; border: 1.5px solid #E8C87A; border-radius: 10px;
  padding: 14px 16px; margin: 16px 0; font-size: 0.85rem; color: #5C3D00; line-height: 1.6;
}

/* Image lightbox */
.lightbox-overlay {
  position: fixed; inset: 0; background: rgba(28,20,16,0.9);
  display: flex; align-items: center; justify-content: center;
  z-index: 1001; cursor: pointer; animation: fadeIn 0.2s ease;
}
.lightbox-overlay img { max-width: 95%; max-height: 95%; border-radius: 8px; }

/* Animations */
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

/* Responsive */
@media (max-width: 768px) {
  .app-container { padding: 12px; }
  .settings-bar { flex-direction: column; }
  .output-grid { grid-template-columns: 1fr; }
  .form-row-inline { flex-direction: column; }
}
</style>
</head>

// ===== HISTORY (IndexedDB) =====
const HIST_DB = 'eggy_history';
const HIST_STORE = 'sessions';
const KEEP_DAYS = 10;

function openHistDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(HIST_DB, 1);
    req.onupgradeneeded = e => {
      if (!e.target.result.objectStoreNames.contains(HIST_STORE))
        e.target.result.createObjectStore(HIST_STORE, { keyPath: 'id' });
    };
    req.onsuccess = () => res(req.result);
    req.onerror = () => rej(req.error);
  });
}
async function histSave(session) {
  try {
    const db = await openHistDB();
    await new Promise((res, rej) => {
      const tx = db.transaction(HIST_STORE, 'readwrite');
      tx.objectStore(HIST_STORE).put(session);
      tx.oncomplete = res; tx.onerror = () => rej(tx.error);
    });
  } catch(e) { console.warn('History save failed', e); }
}
async function histLoadAll() {
  try {
    const db = await openHistDB();
    return await new Promise((res, rej) => {
      const tx = db.transaction(HIST_STORE, 'readonly');
      const req = tx.objectStore(HIST_STORE).getAll();
      req.onsuccess = () => res(req.result || []);
      req.onerror = () => rej(req.error);
    });
  } catch(e) { return []; }
}
async function histDelete(id) {
  try {
    const db = await openHistDB();
    await new Promise((res, rej) => {
      const tx = db.transaction(HIST_STORE, 'readwrite');
      tx.objectStore(HIST_STORE).delete(id);
      tx.oncomplete = res; tx.onerror = () => rej(tx.error);
    });
  } catch(e) { console.warn('History delete failed', e); }
}
async function histCleanup() {
  const cutoff = Date.now() - KEEP_DAYS * 86400000;
  const all = await histLoadAll();
  for (const s of all) if (s.timestamp < cutoff) await histDelete(s.id);
}
async function histDownloadZip(session) {
  const zip = new JSZip();
  session.images.forEach((img, i) => {
    zip.file(`${String(i+1).padStart(2,'0')}_${img.sceneName || 'scene'}.png`, img.base64Data, { base64: true });
  });
  const blob = await zip.generateAsync({ type: 'blob' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const d = new Date(session.timestamp);
  const label = `${d.getMonth()+1}${String(d.getDate()).padStart(2,'0')}_${String(d.getHours()).padStart(2,'0')}${String(d.getMinutes()).padStart(2,'0')}`;
  a.download = `EGGY_${label}.zip`;
  a.click();
  URL.revokeObjectURL(a.href);
}

function NewsletterForm() {
  const [email, setEmail] = React.useState('');
  const [status, setStatus] = React.useState('idle'); // idle | sending | success | error

  const handleSubmit = async (e) => {
    e.preventDefault();
    const v = email.trim();
    if (!v || !v.includes('@')) return;
    setStatus('sending');
    try {
      // 使用 no-cors 避免跨域問題，資料仍會正確送達 Apps Script
      await fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: `email=${encodeURIComponent(v)}`
      });
      setStatus('success');
      setEmail('');
    } catch { setStatus('error'); }
  };

  return (
    <div className="newsletter-wrap">
      <h3>&#x1F4E8; 接收更新通知</h3>
      <p>填入你的 Email，有新版本釋出時第一個知道。</p>
      {status === 'success' ? (
        <div className="newsletter-success">✅ 已登記！有更新時會通知你</div>
      ) : (
        <form onSubmit={handleSubmit}>
          <div className="newsletter-row">
            <input type="email" value={email} onChange={e => setEmail(e.target.value)}
              placeholder="your@email.com" required />
            <button className="btn btn-primary btn-small" type="submit" disabled={status === 'sending'}>
              {status === 'sending' ? '送出中...' : '訂閱'}
            </button>
          </div>
          {status === 'error' && <div className="newsletter-error">送出失敗，請稍後再試</div>}
        </form>
      )}
    </div>
  );
}

function ApiKeySection({ apiKey, setApiKey }) {
  const [show, setShow] = useState(false);
  const [collapsed, setCollapsed] = useState(false);
  const [saved, setSaved] = useState(false);
  const inputRef = useRef();

  useEffect(() => {
    const k = localStorage.getItem('gemini_api_key');
    if (k) { setApiKey(k); setSaved(true); setCollapsed(true); }
  }, []);

  const handleSave = () => {
    const v = inputRef.current.value.trim();
    if (!v) return;
    localStorage.setItem('gemini_api_key', v);
    setApiKey(v); setSaved(true);
  };
  const handleClear = () => {
    localStorage.removeItem('gemini_api_key');
    setApiKey(''); setSaved(false); setCollapsed(false);
    if (inputRef.current) inputRef.current.value = '';
  };

  if (collapsed && saved) {
    return (
      <div className="section" style={{padding:'14px 24px',cursor:'pointer'}} onClick={() => setCollapsed(false)}>
        <span className="status-saved">&#x2705; API Key 已設定</span>
        <span style={{marginLeft:12,fontSize:'0.8rem',color:'#888'}}>（點擊展開修改）</span>
      </div>
    );
  }

  return (
    <div className="section">
      <h2>&#x1F511; API Key 設定</h2>
      <div className="api-key-bar" style={{marginTop:12}}>
        <div className="api-key-input-wrap">
          <input ref={inputRef} type={show?'text':'password'} placeholder="輸入你的 Gemini API Key"
            defaultValue={apiKey} onKeyDown={e => e.key==='Enter' && handleSave()} />
          <button className="eye-toggle" onClick={() => setShow(!show)}>{show?'🙈':'👁️'}</button>
        </div>
        <button className="btn btn-primary btn-small" onClick={handleSave}>儲存 Key</button>
        <button className="btn btn-danger btn-small" onClick={handleClear}>清除 Key</button>

function StorySection({ story, setStory, scenes, setScenes }) {
  const updateScene = (id, k, v) => setScenes(prev => prev.map(s => s.id === id ? {...s, [k]: v} : s));
  const addScene = () => setScenes(prev => [...prev, { id: uid(), name: '', description: '', shotType: 'medium shot', customShot: '', extra: '', locationPhoto: null, locationPhotoMime: null }]);
  const removeScene = (id) => setScenes(prev => prev.filter(s => s.id !== id));

  const handleBasePhotoUpload = (file) => {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      const base64 = e.target.result.split(',')[1];
      setStory(prev => ({...prev, baseSettingPhoto: base64, baseSettingPhotoMime: file.type || 'image/jpeg'}));
    };
    reader.readAsDataURL(file);
  };

  const handleScenePhotoUpload = (id, file) => {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      const base64 = e.target.result.split(',')[1];
      updateScene(id, 'locationPhoto', base64);
      updateScene(id, 'locationPhotoMime', file.type || 'image/jpeg');
    };
    reader.readAsDataURL(file);
  };

  // Drag and drop
  const dragItem = useRef(null);
  const dragOver = useRef(null);
  const [dragIdx, setDragIdx] = useState(null);
  const [overIdx, setOverIdx] = useState(null);

  const handleDragStart = (i) => { dragItem.current = i; setDragIdx(i); };
  const handleDragEnter = (i) => { dragOver.current = i; setOverIdx(i); };
  const handleDragEnd = () => {
    if (dragItem.current !== null && dragOver.current !== null && dragItem.current !== dragOver.current) {
      setScenes(prev => {
        const copy = [...prev];
        const item = copy.splice(dragItem.current, 1)[0];
        copy.splice(dragOver.current, 0, item);
        return copy;
      });
    }
    dragItem.current = null; dragOver.current = null;
    setDragIdx(null); setOverIdx(null);
  };

  return (
    <div className="section">
      <h2>&#x1F3AC; 故事與分鏡</h2>
      <div className="form-row">
        <label>完整故事</label>
        <textarea rows={6} placeholder="貼上提案的完整故事文本。這段文字會幫助 AI 理解整體情緒脈絡，讓每張圖的氛圍更到位。"
          value={story.fullStory} onChange={e => setStory(prev => ({...prev, fullStory: e.target.value}))} />

      <div className="form-row">
        <label>場景基底（選填）</label>
        <textarea rows={2} placeholder="如果整個故事都在同一個場景，在這裡描述。例如：明亮的現代會議室、車子內部..."
          value={story.baseSetting} onChange={e => setStory(prev => ({...prev, baseSetting: e.target.value}))} />
        <div style={{marginTop:8}}>
          <div style={{fontSize:'0.8rem',fontWeight:600,marginBottom:4,color:'#333'}}>&#x1F4F7; 場景基底參考照片（選填）</div>
          <div style={{display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}}>
            {story.baseSettingPhoto ? (
              <>
                <img src={`data:${story.baseSettingPhotoMime};base64,${story.baseSettingPhoto}`}
                  style={{width:80,height:56,objectFit:'cover',borderRadius:6,border:'2px solid #4a7dff'}} />
                <div>
                  <div style={{fontSize:'0.78rem',color:'#2e7d32',marginBottom:4}}>✅ 已上傳場景參考照片</div>
                  <button className="btn btn-danger btn-small"
                    onClick={() => setStory(prev => ({...prev, baseSettingPhoto: null, baseSettingPhotoMime: null}))}>
                    移除照片
                  </button>
                </div>
              </>
            ) : (
              <label style={{cursor:'pointer'}}>
                <div style={{padding:'8px 14px',border:'2px dashed #ccc',borderRadius:8,fontSize:'0.82rem',color:'#666',
                  transition:'all 0.2s',display:'inline-block'}}
                  onMouseEnter={e=>e.currentTarget.style.borderColor='#4a7dff'}
                  onMouseLeave={e=>e.currentTarget.style.borderColor='#ccc'}>
                  &#x2B06; 上傳場景照片
                </div>
                <input type="file" accept="image/*" style={{display:'none'}}
                  onChange={e => handleBasePhotoUpload(e.target.files[0])} />
              </label>
            )}
            <div className="field-hint">上傳後 AI 會參考照片中的環境視覺風格，維持所有場景的一致性。</div>
          </div>
        </div>
      </div>

      <h2 style={{marginTop:20}}>&#x1F4CB; 分鏡卡片</h2>
      {scenes.map((sc, i) => (
        <div className={`card ${dragIdx === i ? 'dragging' : ''} ${overIdx === i && dragIdx !== i ? 'drag-over' : ''}`}
          key={sc.id} draggable

              {sc.locationPhoto ? (

                  <div>
                    <div style={{fontSize:'0.78rem',color:'#2e7d32',marginBottom:4}}>✅ 已上傳場景參考照片</div>
                    <button className="btn btn-danger btn-small"
                      onClick={() => { updateScene(sc.id,'locationPhoto',null); updateScene(sc.id,'locationPhotoMime',null); }}>

// ===== PROMPT BUILDER =====
function buildPrompt(style, characters, product, story, scene, sceneIndex, totalScenes, hasBaseSettingPhoto, hasSceneLocationPhoto, hasProductPhotos) {
  let parts = [];
  // Visual style
  const hasStyle = style.visualStyle || style.colorPalette || style.lighting || style.camera || style.mood || style.extra;
  if (hasStyle) {
    let block = '=== VISUAL STYLE ===\n';
    if (style.visualStyle) block += style.visualStyle + '\n';
    if (style.colorPalette) block += 'Color palette: ' + style.colorPalette + '\n';
    if (style.lighting) block += 'Lighting: ' + style.lighting + '\n';
    if (style.camera) block += 'Camera: ' + style.camera + '\n';
    if (style.mood) block += 'Mood: ' + style.mood + '\n';
    if (style.extra) block += style.extra + '\n';
    parts.push(block.trim());
  }
  // Characters
  const validChars = characters.filter(c => c.name || c.description);
  if (validChars.length > 0) {
    const hasPhotos = validChars.some(c => c.refPhoto);
    let block = '=== CHARACTERS (maintain strict visual consistency across all scenes) ===\n';
    if (hasPhotos) block += 'Reference photos have been provided above. Match the facial features and appearance of the person in each reference photo exactly.\n';
    validChars.forEach((c, idx) => {
      const eth = ETHNICITY_MAP[c.ethnicity] || c.ethnicity;
      const desc = c.description ? c.description : '';
      const photoNote = c.refPhoto ? ` (refer to reference photo ${idx + 1} above for exact facial appearance)` : '';
      const label = eth === 'Animal' ? `An animal${photoNote}` : `A ${eth} person${photoNote}`;
      block += `• ${c.name || 'Unnamed'}: ${label}. ${desc}\n`;
    });
    parts.push(block.trim());
  }
  // Featured product
  const hasProduct = product && (product.name || product.description || hasProductPhotos);
  if (hasProduct) {
    let block = '=== FEATURED PRODUCT (must appear consistently across all scenes) ===\n';
    if (hasProductPhotos) block += 'Reference photos of the product have been provided above. Match its exact appearance, shape, branding, and packaging in every scene.\n';
    if (product.name) block += `Product name: ${product.name}\n`;
    if (product.description) block += product.description + '\n';
    parts.push(block.trim());
  }
  // Story context
  if (story.fullStory) {
    parts.push('=== STORY CONTEXT (for emotional and narrative understanding — do NOT illustrate the entire story, only the specific scene below) ===\n' + story.fullStory);
  }
  // Base setting
  if (story.baseSetting || hasBaseSettingPhoto) {
    let block = '=== BASE SETTING ===\n';
    if (hasBaseSettingPhoto) block += 'A reference photo of the location/environment has been provided above. Match this setting visually across all scenes.\n';
    if (story.baseSetting) block += story.baseSetting + '\n';
    parts.push(block.trim());
  }
  // Scene
  const shotType = scene.shotType === 'Custom' ? scene.customShot : scene.shotType;
  let sceneBlock = `=== SCENE TO ILLUSTRATE ===\nScene ${sceneIndex + 1} of ${totalScenes}: ${scene.name || 'untitled'}\n`;
  if (hasSceneLocationPhoto) sceneBlock += 'A location reference photo specific to this scene has been provided above. Match this environment.\n';
  if (shotType) sceneBlock += `Shot type: ${shotType}\n`;
  if (scene.description) sceneBlock += scene.description + '\n';
  if (scene.extra) sceneBlock += scene.extra + '\n';
  parts.push(sceneBlock.trim());
  // Consistency reminder
  parts.push(`IMPORTANT: This is scene ${sceneIndex + 1} of a ${totalScenes}-scene series. Maintain strict visual consistency in character appearance, clothing, art style, color grading, and lighting across all scenes. Characters must look like the exact same people in every image. When two or more characters interact, they must be clearly engaged with each other — direct eye contact, animated facial expressions, open body language facing each other, genuine conversational energy.`);
  return parts.join('\n\n');
}

function buildRevisionPrompt(basePrompt, revisionNote) {
  return basePrompt + '\n\n=== REVISION NOTES (use these to adjust the previous result) ===\nThe previous generation of this scene was not satisfactory. Please regenerate with the following adjustments:\n' + revisionNote + '\n\nPlease keep all other aspects (characters, style, color grading, setting) exactly the same as specified above. Only adjust based on the revision notes.';
}

function buildPartialRegenerationPrompt(patchDesc, pct, originalPrompt) {
  return `=== PARTIAL AREA REGENERATION ===
A reference image is provided above. A RED RECTANGLE has been drawn on it to mark the specific region to be modified.

STRICT INSTRUCTIONS:
1. Reproduce the reference image AS EXACTLY AS POSSIBLE — same composition, same characters, same poses, same colors, same lighting, same background — for ALL areas OUTSIDE the red rectangle.
2. ONLY modify the content INSIDE the red rectangle. That region spans approximately from (${pct.left}%, ${pct.top}%) to (${pct.right}%, ${pct.bottom}%) of the full image width/height.
3. Inside the marked region, apply this specific change: "${patchDesc}"
4. The boundary between the modified region and the surrounding image should blend naturally without visible seams.
5. Do NOT alter anything outside the red rectangle — not the lighting, not the characters, not the background, nothing.

=== ORIGINAL SCENE CONTEXT (for style and character reference) ===
${originalPrompt}`;
}

// ===== API CALL =====
async function callGeminiAPI(apiKey, model, prompt, aspectRatio, resolution, refPhotos, annotatedImage, locationPhotos, productPhotos) {
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent`;
  // Build parts: annotated image → character ref photos → product photos → location photos → prompt text
  const parts = [];
  if (annotatedImage) {
    parts.push({ inlineData: { mimeType: 'image/png', data: annotatedImage } });
    parts.push({ text: '以上是需要局部修改的參考圖，圖中紅色框標示的區域是要修改的部分。請完全保留紅色框以外的所有內容，只修改紅色框內的部分。' });
  }
  if (refPhotos && refPhotos.length > 0) {
    refPhotos.forEach(p => {
      parts.push({ inlineData: { mimeType: p.mime, data: p.base64 } });
    });
    parts.push({ text: annotatedImage ? '以上是角色參考照片，用於確保角色外觀一致性。' : '以上是角色參考照片。' });
  }
  if (productPhotos && productPhotos.length > 0) {
    productPhotos.forEach(p => {
      parts.push({ inlineData: { mimeType: p.mime, data: p.base64 } });
    });
    parts.push({ text: '以上是產品參考照片，請確保畫面中的產品外觀、形狀、品牌與包裝與參考照片完全一致。' });
  }
  if (locationPhotos && locationPhotos.length > 0) {
    locationPhotos.forEach(p => {
      parts.push({ inlineData: { mimeType: p.mime, data: p.base64 } });
    });
    parts.push({ text: '以上是場景／地點參考照片，請確保畫面中的環境視覺與此照片一致。' });
  }
  parts.push({ text: prompt });
  const body = {
    contents: [{ parts }],
    generationConfig: {
      responseModalities: ['TEXT', 'IMAGE'],
      imageConfig: { aspectRatio: aspectRatio, imageSize: resolution }
    }
  };

  const delays = [3000, 6000, 10000, 15000, 20000, 30000, 30000, 30000, 30000, 30000]; // 重試間隔，最多10次
  let lastError;

  for (let attempt = 0; attempt <= delays.length; attempt++) {
    if (attempt > 0) {
      await new Promise(r => setTimeout(r, delays[attempt - 1]));
    }
    try {
      const resp = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-goog-api-key': apiKey },
        body: JSON.stringify(body)
      });
      if (resp.status === 429) throw new Error('RATE_LIMIT');
      if (resp.status === 401 || resp.status === 403) throw new Error('INVALID_KEY');
      if (resp.status === 503 || resp.status === 500 || resp.status === 502) {
        lastError = new Error(`SERVER_ERROR_${resp.status}`);
        continue; // 自動重試
      }
      if (!resp.ok) {
        const errBody = await resp.text().catch(() => '');
        throw new Error(`API_ERROR_${resp.status}: ${errBody.slice(0, 200)}`);
      }
      const data = await resp.json();
      if (!data.candidates || !data.candidates[0]) throw new Error('NO_CANDIDATES');
      const imgPart = data.candidates[0].content.parts.find(p => p.inlineData);
      if (!imgPart) throw new Error('NO_IMAGE');
      return imgPart.inlineData.data; // base64
    } catch (err) {
      if (err.message === 'INVALID_KEY' || err.message === 'RATE_LIMIT') throw err;
      if (err.message.startsWith('API_ERROR_') || err.message === 'NO_CANDIDATES' || err.message === 'NO_IMAGE') throw err;
      lastError = err; // 網路錯誤等，繼續重試
    }
  }
  throw lastError || new Error('SERVER_ERROR: 重試多次後仍失敗');
}

// ===== INPAINT MODAL =====
function InpaintModal({ result, onClose, onSubmit, generating }) {
  const [selVersionNum, setSelVersionNum] = React.useState(result.selectedVersion);
  const [selection, setSelection] = React.useState(null);
  const [isDragging, setIsDragging] = React.useState(false);
  const dragStartRef = React.useRef(null);
  const [patchDesc, setPatchDesc] = React.useState('');
  const [canvH, setCanvH] = React.useState(0);
  const canvasRef = React.useRef(null);
  const imgRef = React.useRef(null);

  const selVer = result.versions.find(v => v.versionNumber === selVersionNum)
    || result.versions[result.versions.length - 1];
  const imgSrc = `data:image/png;base64,${selVer.base64Data}`;

  const onImgLoad = () => {
    const img = imgRef.current;
    if (img && img.naturalWidth > 0) {
      setCanvH(Math.round(CANVAS_W * img.naturalHeight / img.naturalWidth));
    }
  };

  // Draw image + overlay on canvas
  React.useEffect(() => {
    if (canvH <= 0) return;
    const canvas = canvasRef.current;
    const img = imgRef.current;
    if (!canvas || !img) return;
    const draw = () => {
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      if (selection && selection.w >= 4 && selection.h >= 4) {
        const {x, y, w, h} = selection;
        ctx.fillStyle = 'rgba(0,0,0,0.45)';
        ctx.fillRect(0, 0, canvas.width, y);
        ctx.fillRect(0, y + h, canvas.width, canvas.height - (y + h));
        ctx.fillRect(0, y, x, h);
        ctx.fillRect(x + w, y, canvas.width - (x + w), h);
        ctx.strokeStyle = '#ff3333';
        ctx.lineWidth = 2;
        ctx.setLineDash([6, 3]);
        ctx.strokeRect(x + 1, y + 1, w - 2, h - 2);
        ctx.setLineDash([]);
      }
    };
    if (img.complete && img.naturalWidth > 0) {
      draw();
    } else {
      img.addEventListener('load', draw, { once: true });
      return () => img.removeEventListener('load', draw);
    }
  }, [selection, canvH, imgSrc]);

  const getPos = (e) => {
    const canvas = canvasRef.current;
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const src = e.touches ? e.touches[0] : e;
    return {
      x: Math.max(0, Math.min(canvas.width,  (src.clientX - rect.left) * scaleX)),
      y: Math.max(0, Math.min(canvas.height, (src.clientY - rect.top)  * scaleY))
    };
  };

  const onPointerDown = (e) => {
    if (e.type === 'touchstart') e.preventDefault();
    dragStartRef.current = getPos(e);
    setIsDragging(true);
    setSelection(null);
  };
  const onPointerMove = (e) => {
    if (e.type === 'touchmove') e.preventDefault();
    if (!isDragging || !dragStartRef.current) return;
    const pos = getPos(e);
    const s = dragStartRef.current;
    setSelection({ x: Math.min(s.x, pos.x), y: Math.min(s.y, pos.y), w: Math.abs(pos.x - s.x), h: Math.abs(pos.y - s.y) });
  };
  const onPointerUp = (e) => {
    if (e.type === 'touchend') e.preventDefault();
    setIsDragging(false);
    setSelection(prev => (prev && prev.w >= 10 && prev.h >= 10) ? prev : null);
  };

  const hasSel = selection && selection.w >= 10 && selection.h >= 10;

  const handleSubmit = () => {
    if (!hasSel) { alert('請先在圖片上框選要修改的區域'); return; }
    if (!patchDesc.trim()) { alert('請描述這個區域要改成什麼樣子'); return; }

    const img = imgRef.current;
    const origW = img.naturalWidth;
    const origH = img.naturalHeight;
    const scaleX = origW / CANVAS_W;
    const scaleY = origH / canvH;
    const sx = selection.x * scaleX, sy = selection.y * scaleY;
    const sw = selection.w * scaleX, sh = selection.h * scaleY;

    // Build annotated image at original resolution
    const ac = document.createElement('canvas');
    ac.width = origW; ac.height = origH;
    const ctx = ac.getContext('2d');
    ctx.drawImage(img, 0, 0, origW, origH);
    ctx.fillStyle = 'rgba(255,0,0,0.18)';
    ctx.fillRect(sx, sy, sw, sh);
    ctx.strokeStyle = '#ff0000';
    ctx.lineWidth = Math.max(3, origW / 250);
    ctx.strokeRect(sx, sy, sw, sh);
    const annotBase64 = ac.toDataURL('image/png').split(',')[1];

    const pct = {
      left:   (selection.x / CANVAS_W * 100).toFixed(1),
      top:    (selection.y / canvH   * 100).toFixed(1),
      right:  ((selection.x + selection.w) / CANVAS_W * 100).toFixed(1),
      bottom: ((selection.y + selection.h) / canvH   * 100).toFixed(1)
    };
    onSubmit(selVersionNum, annotBase64, pct, patchDesc.trim(), selVer.prompt);
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-content" style={{maxWidth:860}} onClick={e => e.stopPropagation()}>
        <button className="modal-close" onClick={onClose}>&#x2715;</button>
        <h2 style={{marginBottom:8}}>&#x1F58C;&#xFE0F; 局部調整</h2>
        <p style={{fontSize:'0.85rem',color:'#666',marginBottom:14}}>
          在圖片上拖拉框選要修改的區域，再描述要改成什麼。框選外的部分會盡量保持不變。
        </p>

        {result.versions.length > 1 && (
          <div style={{marginBottom:14}}>
            <div style={{fontSize:'0.82rem',fontWeight:600,marginBottom:6}}>選擇基底版本：</div>
            <div className="version-history">
              {result.versions.map(v => (
                <div key={v.versionNumber}
                  className={`version-thumb ${selVersionNum === v.versionNumber ? 'selected' : ''}`}
                  onClick={() => { setSelVersionNum(v.versionNumber); setSelection(null); setCanvH(0); }}>
                  <img src={`data:image/png;base64,${v.base64Data}`} alt={`v${v.versionNumber}`} />
                  <div className="version-label">
                    v{v.versionNumber}{v.isPartial ? ' \u2702\uFE0F' : ''}{selVersionNum === v.versionNumber ? ' \u2705' : ''}
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        <img ref={imgRef} src={imgSrc} style={{display:'none'}} onLoad={onImgLoad} />

        <div className="inpaint-canvas-area">
          {canvH > 0
            ? <canvas ref={canvasRef} width={CANVAS_W} height={canvH}
                onMouseDown={onPointerDown} onMouseMove={onPointerMove} onMouseUp={onPointerUp}
                onMouseLeave={() => { if (isDragging) { setIsDragging(false); setSelection(prev => (prev && prev.w >= 10 && prev.h >= 10) ? prev : null); } }}
                onTouchStart={onPointerDown} onTouchMove={onPointerMove} onTouchEnd={onPointerUp} />
            : <div className="inpaint-canvas-loading">圖片載入中...</div>
          }
        </div>

        <div className={`inpaint-hint${hasSel ? ' has-sel' : ''}`}>
          {hasSel ? '✅ 已框選區域（可重新拖拉來重選）' : '👆 在圖片上拖拉框選要修改的區域'}
        </div>

        <div className="form-row">
          <label>框選區域要改成什麼？</label>
          <textarea rows={3} value={patchDesc} onChange={e => setPatchDesc(e.target.value)}
            placeholder='例如：「男生的表情改成更驚訝」、「把窗戶換成牆壁」、「讓頭髮往右飄」' />
        </div>

        <div style={{display:'flex',gap:8,marginTop:12,flexWrap:'wrap',alignItems:'center'}}>
          <button className="btn btn-primary"
            onClick={handleSubmit}
            disabled={generating || !hasSel || !patchDesc.trim()}>
            &#x1F680; 局部重新生成
          </button>
          <button className="btn btn-secondary" onClick={onClose}>取消</button>
          {hasSel && (
            <button className="btn btn-danger btn-small" onClick={() => setSelection(null)}>清除選取</button>
          )}
        </div>
        <div style={{marginTop:10,fontSize:'0.78rem',color:'#bbb'}}>
          提示：AI 會盡力只修改框選範圍內的內容，並讓邊界自然融合。效果取決於選取範圍的明確程度與描述的具體程度。
        </div>
      </div>
    </div>
  );
}

// ===== OUTPUT CARD =====
function OutputCard({ result, onRegenerate, onRevisionRegenerate, onSelectVersion, onLightbox, onInpaint, generating }) {
  const [showPrompt, setShowPrompt] = useState(false);
  const [showRevision, setShowRevision] = useState(false);
  const [revisionText, setRevisionText] = useState('');
  const selectedVer = result.versions[result.selectedVersion - 1] || result.versions[result.versions.length - 1];
  const currentImg = `data:image/png;base64,${selectedVer.base64Data}`;

  const downloadOne = () => {
    const a = document.createElement('a');
    a.href = currentImg;
    a.download = `${String(result.sceneIndex + 1).padStart(2, '0')}_${result.sceneName || 'scene'}.png`;
    a.click();
  };

  const handleRevisionSubmit = () => {
    if (!revisionText.trim()) return;
    onRevisionRegenerate(result.sceneIndex, revisionText.trim());
    setRevisionText(''); setShowRevision(false);
  };

  return (
    <div className="output-card">
      <img src={currentImg} alt={result.sceneName} onClick={() => onLightbox(currentImg)} />
      <div className="output-card-body">
        <div className="output-card-title">
          {String(result.sceneIndex + 1).padStart(2, '0')} — {result.sceneName || 'untitled'}
        </div>
        <div className="gen-count">第 {selectedVer.versionNumber} 次生成（共 {result.versions.length} 版）</div>

        {result.versions.length > 1 && (
          <div>
            <div style={{fontSize:'0.8rem',fontWeight:600,marginTop:8}}>版本歷史：</div>
            <div className="version-history">
              {result.versions.map((v, vi) => (
                <div key={vi} className={`version-thumb ${result.selectedVersion === v.versionNumber ? 'selected' : ''}`}
                  onClick={() => onSelectVersion(result.sceneIndex, v.versionNumber)}>
                  <img src={`data:image/png;base64,${v.base64Data}`} alt={`v${v.versionNumber}`} />
                  <div className="version-label">
                    v{v.versionNumber}{v.isPartial ? ' \u2702\uFE0F' : ''}{result.selectedVersion === v.versionNumber ? ' \u2705' : ''}
                  </div>
                </div>
              ))}
            </div>
            {selectedVer.revisionNote && (
              <div className="version-note">補充描述：{selectedVer.revisionNote}</div>
            )}
          </div>
        )}

        <div className={`prompt-preview ${showPrompt ? 'open' : ''}`}>
          <pre>{selectedVer.prompt}</pre>
        </div>

        {showRevision && (
          <div className="revision-area">
            <label>補充描述</label>
            <textarea rows={3} value={revisionText} onChange={e => setRevisionText(e.target.value)}
              placeholder='描述你想修正的方向。例如：「人物表情要更誇張」「背景要更亮」' />
            <div style={{marginTop:8,display:'flex',gap:8}}>
              <button className="btn btn-primary btn-small" onClick={handleRevisionSubmit} disabled={generating}>
                &#x1F680; 重新生成
              </button>
              <button className="btn btn-secondary btn-small" onClick={() => setShowRevision(false)}>取消</button>
            </div>
          </div>
        )}

        <div className="output-card-actions">
          <button className="btn btn-secondary btn-small" onClick={() => onRegenerate(result.sceneIndex)} disabled={generating}>
            &#x1F504; 重新生成
          </button>
          <button className="btn btn-secondary btn-small" onClick={() => setShowRevision(!showRevision)} disabled={generating}>
            &#x270F;&#xFE0F; 補充描述
          </button>
          <button className="btn btn-secondary btn-small" onClick={() => onInpaint(result.sceneIndex)} disabled={generating}
            title="框選圖片局部區域進行局部修改，其餘部分保持不變">
            &#x1F58C;&#xFE0F; 局部調整
          </button>
          <button className="btn btn-secondary btn-small" onClick={() => setShowPrompt(!showPrompt)}>
            {showPrompt ? '隱藏 Prompt' : '查看 Prompt'}
          </button>
          <button className="btn btn-success btn-small" onClick={downloadOne}>&#x2B07;&#xFE0F; 下載</button>
        </div>
      </div>
    </div>
  );
}

// ===== HISTORY SECTION =====
function HistorySection({ sessions, onDelete }) {
  const [open, setOpen] = useState(true);
  const [downloading, setDownloading] = useState(null);
  if (sessions.length === 0) return null;

  const fmt = ts => {
    const d = new Date(ts);
    return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  };
  const daysLeft = ts => Math.max(0, Math.ceil((ts + KEEP_DAYS * 86400000 - Date.now()) / 86400000));

  const handleDownload = async (s) => {
    setDownloading(s.id);
    await histDownloadZip(s);
    setDownloading(null);
  };

  return (
    <div className="section">
      <div className="section-header" onClick={() => setOpen(!open)}>
        <h2>&#x1F5C2; 生成記錄（保留 {KEEP_DAYS} 天）</h2>
        <span className={`collapse-icon ${open ? 'open' : ''}`}>&#x25BC;</span>
      </div>
      {open && (
        <div style={{marginTop:16}}>
          <div className="field-hint" style={{marginBottom:14}}>共 {sessions.length} 筆，儲存於此瀏覽器，到期自動清除。</div>
          {[...sessions].sort((a,b) => b.timestamp - a.timestamp).map(s => (
            <div key={s.id} style={{background:'#F7F2EE',border:'1.5px solid #EDE0D6',borderRadius:10,padding:'14px 16px',marginBottom:12}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:8,marginBottom:10}}>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <span style={{fontWeight:700,fontSize:'0.9rem',color:'#1C1410'}}>{fmt(s.timestamp)}</span>
                  <span style={{fontSize:'0.75rem',color:'#9A7F76'}}>· {s.images.length} 張 · 剩 {daysLeft(s.timestamp)} 天</span>
                </div>
                <div style={{display:'flex',gap:8}}>
                  <button className="btn btn-secondary btn-small"
                    onClick={() => handleDownload(s)} disabled={downloading === s.id}>
                    {downloading === s.id ? '壓縮中...' : '&#x1F4E6; 下載 ZIP'}
                  </button>
                  <button className="btn btn-danger btn-small" onClick={() => onDelete(s.id)}>刪除</button>
                </div>
              </div>
              <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                {s.images.map((img, i) => (
                  <div key={i} style={{position:'relative',flexShrink:0}}>
                    <img src={`data:image/png;base64,${img.base64Data}`}
                      style={{width:96,height:68,objectFit:'cover',borderRadius:6,border:'1px solid #EDE0D6',display:'block'}} />
                    <div style={{position:'absolute',bottom:0,left:0,right:0,background:'rgba(28,20,16,0.6)',
                      color:'#fff',fontSize:'0.58rem',padding:'2px 4px',borderRadius:'0 0 5px 5px',
                      overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                      {String(i+1).padStart(2,'0')} {img.sceneName || ''}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ===== MAIN APP =====
function App() {
  const [apiKey, setApiKey] = useState(() => localStorage.getItem('gemini_api_key') || '');

  // Show onboarding if no key saved yet
  if (!apiKey) {
    return <OnboardingScreen onComplete={setApiKey} />;
  }
  const [settings, setSettings] = useState({ model: MODELS[0].value, aspectRatio: '16:9', resolution: '1K' });
  const [style, setStyle] = useState({ visualStyle:'', colorPalette:'', lighting:'', camera:'', mood:'', extra:'' });
  const [characters, setCharacters] = useState([
    { id: uid(), name: '', ethnicity: '台灣人', description: '' },
    { id: uid(), name: '', ethnicity: '台灣人', description: '' }
  ]);
  const [product, setProduct] = useState({ name: '', description: '', photos: [] });
  const [story, setStory] = useState({ fullStory: '', baseSetting: '', baseSettingPhoto: null, baseSettingPhotoMime: null });
  const [scenes, setScenes] = useState([
    { id: uid(), name: '', description: '', shotType: 'medium shot', customShot: '', extra: '', locationPhoto: null, locationPhotoMime: null },
    { id: uid(), name: '', description: '', shotType: 'medium shot', customShot: '', extra: '', locationPhoto: null, locationPhotoMime: null },
    { id: uid(), name: '', description: '', shotType: 'medium shot', customShot: '', extra: '', locationPhoto: null, locationPhotoMime: null }
  ]);
  const [results, setResults] = useState([]);
  const [progress, setProgress] = useState([]); // { status, label, time }
  const [generating, setGenerating] = useState(false);
  const [showPromptModal, setShowPromptModal] = useState(false);
  const [lightboxSrc, setLightboxSrc] = useState(null);
  const [errors, setErrors] = useState([]);
  const [inpaintSceneIdx, setInpaintSceneIdx] = useState(null);
  const [history, setHistory] = useState([]);
  const abortRef = useRef(false);

  useEffect(() => {
    histCleanup().then(() => histLoadAll().then(setHistory));
  }, []);

  // Build all prompts for preview
  const getProductPhotos = () => product.photos.map(p => ({ base64: p.base64, mime: p.mime }));
  const allPrompts = scenes.map((sc, i) => ({
    label: `${String(i+1).padStart(2,'0')} — ${sc.name || 'untitled'}`,
    prompt: buildPrompt(style, characters, product, story, sc, i, scenes.length, !!story.baseSettingPhoto, !!sc.locationPhoto, product.photos.length > 0)
  }));

  // Validate before generate
  const validate = () => {
    const errs = [];
    if (!apiKey) errs.push('請先設定 API Key');
    if (scenes.length === 0) errs.push('至少需要 1 個分鏡');
    scenes.forEach((sc, i) => {
      if (!sc.description.trim()) errs.push(`分鏡 ${i+1} 的畫面描述不能為空`);
    });
    return errs;
  };

  // Build location photos array for a specific scene (base setting photo + scene-specific photo)
  const getLocationPhotos = (sceneIndex) => {
    const photos = [];
    if (story.baseSettingPhoto) photos.push({ base64: story.baseSettingPhoto, mime: story.baseSettingPhotoMime || 'image/jpeg' });
    const sc = scenes[sceneIndex];
    if (sc && sc.locationPhoto) photos.push({ base64: sc.locationPhoto, mime: sc.locationPhotoMime || 'image/jpeg' });
    return photos;
  };

  // Main generate
  const handleGenerate = async () => {
    const errs = validate();
    if (errs.length > 0) { setErrors(errs); return; }
    setErrors([]);
    setGenerating(true);
    abortRef.current = false;
    const initProgress = scenes.map((sc, i) => ({ status: 'waiting', label: `${String(i+1).padStart(2,'0')}_${sc.name || 'untitled'}`, time: null }));
    setProgress(initProgress);
    const newResults = [];

    for (let i = 0; i < scenes.length; i++) {
      if (abortRef.current) break;
      setProgress(prev => prev.map((p, j) => j === i ? {...p, status: 'running'} : p));
      const locPhotos = getLocationPhotos(i);
      const prodPhotos = getProductPhotos();
      const prompt = buildPrompt(style, characters, product, story, scenes[i], i, scenes.length, !!story.baseSettingPhoto, !!scenes[i].locationPhoto, prodPhotos.length > 0);
      const start = Date.now();
      try {
        const refPhotos = characters.filter(c => c.refPhoto).map(c => ({ base64: c.refPhoto, mime: c.refPhotoMime || 'image/jpeg' }));
        const base64 = await callGeminiAPI(apiKey, settings.model, prompt, settings.aspectRatio, settings.resolution, refPhotos, null, locPhotos, prodPhotos);
        const elapsed = ((Date.now() - start) / 1000).toFixed(1);
        newResults.push({
          sceneIndex: i, sceneName: scenes[i].name || 'untitled',
          versions: [{ versionNumber: 1, base64Data: base64, prompt, revisionNote: null, timestamp: new Date().toISOString() }],
          selectedVersion: 1
        });
        setResults([...newResults]);
        setProgress(prev => prev.map((p, j) => j === i ? {...p, status: 'done', time: elapsed + 's'} : p));
      } catch (err) {
        const elapsed = ((Date.now() - start) / 1000).toFixed(1);
        let msg = '生成失敗';
        if (err.message === 'RATE_LIMIT') msg = '已達 API 速率限制';
        else if (err.message === 'INVALID_KEY') msg = 'API Key 無效';
        else if (err.message === 'NO_IMAGE') msg = 'API 未回傳圖片（可能是內容限制）';
        else if (err.message.includes('SERVER_ERROR')) msg = '伺服器暫時無法使用 (503)，已重試 10 次';
        // For rate limit, wait and retry once
        if (err.message === 'RATE_LIMIT') {
          setProgress(prev => prev.map((p, j) => j === i ? {...p, status: 'running', time: '等待 30 秒後重試...'} : p));
          await new Promise(r => setTimeout(r, 30000));
          try {
            const base64 = await callGeminiAPI(apiKey, settings.model, prompt, settings.aspectRatio, settings.resolution, refPhotos, null, locPhotos, prodPhotos);
            const elapsed2 = ((Date.now() - start) / 1000).toFixed(1);
            newResults.push({
              sceneIndex: i, sceneName: scenes[i].name || 'untitled',
              versions: [{ versionNumber: 1, base64Data: base64, prompt, revisionNote: null, timestamp: new Date().toISOString() }],
              selectedVersion: 1
            });
            setResults([...newResults]);
            setProgress(prev => prev.map((p, j) => j === i ? {...p, status: 'done', time: elapsed2 + 's'} : p));
            if (i < scenes.length - 1) await new Promise(r => setTimeout(r, 3000));
            continue;
          } catch (e2) { msg = '重試後仍失敗'; }
        }
        newResults.push({ sceneIndex: i, sceneName: scenes[i].name || 'untitled', versions: [], selectedVersion: 0, error: msg });
        setResults([...newResults]);
        setProgress(prev => prev.map((p, j) => j === i ? {...p, status: 'error', time: msg} : p));
      }
      // Wait 3s between calls
      if (i < scenes.length - 1 && !abortRef.current) await new Promise(r => setTimeout(r, 3000));
    }
    // Auto-save to history
    const saved = newResults.filter(r => r.versions.length > 0);
    if (saved.length > 0) {
      const session = {
        id: uid(), timestamp: Date.now(),
        images: saved.map(r => {
          const ver = r.versions[r.versions.length - 1];
          return { sceneIndex: r.sceneIndex, sceneName: r.sceneName, base64Data: ver.base64Data };
        })
      };
      await histSave(session);
      setHistory(prev => [...prev, session]);
    }
    setGenerating(false);
  };

  // Single scene regenerate
  const handleRegenerate = async (sceneIdx) => {
    setGenerating(true);
    const r = results.find(r => r.sceneIndex === sceneIdx);
    if (!r) { setGenerating(false); return; }
    const scene = scenes[sceneIdx];
    if (!scene) { setGenerating(false); return; }
    const prodPhotos = getProductPhotos();
    const prompt = buildPrompt(style, characters, product, story, scene, sceneIdx, scenes.length, !!story.baseSettingPhoto, !!scene.locationPhoto, prodPhotos.length > 0);
    const refPhotos = characters.filter(c => c.refPhoto).map(c => ({ base64: c.refPhoto, mime: c.refPhotoMime || 'image/jpeg' }));
    const locPhotos = getLocationPhotos(sceneIdx);
    try {
      const base64 = await callGeminiAPI(apiKey, settings.model, prompt, settings.aspectRatio, settings.resolution, refPhotos, null, locPhotos, prodPhotos);
      const newVer = { versionNumber: r.versions.length + 1, base64Data: base64, prompt, revisionNote: null, timestamp: new Date().toISOString() };
      setResults(prev => prev.map(res => res.sceneIndex === sceneIdx
        ? {...res, versions: [...res.versions, newVer], selectedVersion: newVer.versionNumber, error: undefined}
        : res));
    } catch (err) {
      alert('重新生成失敗：' + err.message);
    }
    setGenerating(false);
  };

  // Revision regenerate
  const handleRevisionRegenerate = async (sceneIdx, revisionNote) => {
    setGenerating(true);
    const r = results.find(r => r.sceneIndex === sceneIdx);
    if (!r) { setGenerating(false); return; }
    const scene = scenes[sceneIdx];
    if (!scene) { setGenerating(false); return; }
    const prodPhotos = getProductPhotos();
    const basePrompt = buildPrompt(style, characters, product, story, scene, sceneIdx, scenes.length, !!story.baseSettingPhoto, !!scene.locationPhoto, prodPhotos.length > 0);
    const fullPrompt = buildRevisionPrompt(basePrompt, revisionNote);
    const refPhotos = characters.filter(c => c.refPhoto).map(c => ({ base64: c.refPhoto, mime: c.refPhotoMime || 'image/jpeg' }));
    const locPhotos = getLocationPhotos(sceneIdx);
    try {
      const base64 = await callGeminiAPI(apiKey, settings.model, fullPrompt, settings.aspectRatio, settings.resolution, refPhotos, null, locPhotos, prodPhotos);
      const newVer = { versionNumber: r.versions.length + 1, base64Data: base64, prompt: fullPrompt, revisionNote, timestamp: new Date().toISOString() };
      setResults(prev => prev.map(res => res.sceneIndex === sceneIdx
        ? {...res, versions: [...res.versions, newVer], selectedVersion: newVer.versionNumber, error: undefined}
        : res));
    } catch (err) {
      alert('重新生成失敗：' + err.message);
    }
    setGenerating(false);
  };

  // Select version
  const handleSelectVersion = (sceneIdx, verNum) => {
    setResults(prev => prev.map(r => r.sceneIndex === sceneIdx ? {...r, selectedVersion: verNum} : r));
  };

  // Partial (inpaint) regenerate
  const handlePartialRegenerate = async (sceneIdx, sourceVersionNum, annotBase64, pct, patchDesc, originalPrompt) => {
    setInpaintSceneIdx(null);
    setGenerating(true);
    const r = results.find(r => r.sceneIndex === sceneIdx);
    if (!r) { setGenerating(false); return; }
    const partialPrompt = buildPartialRegenerationPrompt(patchDesc, pct, originalPrompt);
    const charRefPhotos = characters.filter(c => c.refPhoto).map(c => ({ base64: c.refPhoto, mime: c.refPhotoMime || 'image/jpeg' }));
    const locPhotos = getLocationPhotos(sceneIdx);
    const prodPhotos = getProductPhotos();
    try {
      const base64 = await callGeminiAPI(apiKey, settings.model, partialPrompt, settings.aspectRatio, settings.resolution, charRefPhotos, annotBase64, locPhotos, prodPhotos);
      const newVer = {
        versionNumber: r.versions.length + 1,
        base64Data: base64,
        prompt: partialPrompt,
        revisionNote: `局部調整 (v${sourceVersionNum} 基底)：${patchDesc}`,
        isPartial: true,
        timestamp: new Date().toISOString()
      };
      setResults(prev => prev.map(res => res.sceneIndex === sceneIdx
        ? {...res, versions: [...res.versions, newVer], selectedVersion: newVer.versionNumber, error: undefined}
        : res));
    } catch (err) {
      alert('局部重新生成失敗：' + err.message);
    }
    setGenerating(false);
  };

  // ZIP download
  const handleDownloadZip = async () => {
    const zip = new JSZip();
    results.forEach(r => {
      if (r.versions.length === 0) return;
      const ver = r.versions.find(v => v.versionNumber === r.selectedVersion) || r.versions[r.versions.length - 1];
      zip.file(`${String(r.sceneIndex + 1).padStart(2, '0')}_${r.sceneName || 'scene'}.png`, ver.base64Data, { base64: true });
    });
    // Add prompts.md
    let md = '# Nano Banana Storyboard — Prompt 記錄\n\n';
    results.forEach(r => {
      if (r.versions.length === 0) return;
      const ver = r.versions.find(v => v.versionNumber === r.selectedVersion) || r.versions[r.versions.length - 1];
      md += `## ${String(r.sceneIndex + 1).padStart(2, '0')} — ${r.sceneName}\n\n\`\`\`\n${ver.prompt}\n\`\`\`\n\n`;
    });
    zip.file('prompts.md', md);
    const blob = await zip.generateAsync({ type: 'blob' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'NanoBanana-Storyboard.zip';
    a.click();
    URL.revokeObjectURL(a.href);
  };

  // Export prompts
  const handleExportPrompts = () => {
    let md = '# Nano Banana Storyboard — Prompt 記錄\n\n';
    allPrompts.forEach(p => { md += `## ${p.label}\n\n\`\`\`\n${p.prompt}\n\`\`\`\n\n`; });
    const blob = new Blob([md], { type: 'text/markdown' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'storyboard-prompts.md';
    a.click();
    URL.revokeObjectURL(a.href);
  };

  const hasResults = results.some(r => r.versions.length > 0);

  return (
    <>
    <header className="app-header">
      <h1>🥚 EGGY 腳本下蛋機</h1>
      <p>如果你的便便也像下蛋一樣，那你要多喝水。&nbsp;&#x2022;&nbsp; <span className="version-badge">{APP_VERSION}</span></p>
    </header>
    <div className="app-container">

      <ApiKeySection apiKey={apiKey} setApiKey={setApiKey} />
      <SettingsBar settings={settings} setSettings={setSettings} />
      <VisualStyleSection style={style} setStyle={setStyle} />
      <CharacterSection characters={characters} setCharacters={setCharacters} />
      <ProductSection product={product} setProduct={setProduct} />
      <StorySection story={story} setStory={setStory} scenes={scenes} setScenes={setScenes} />

      {/* Generate controls */}
      <div className="section" style={{textAlign:'center'}}>
        {errors.length > 0 && (
          <div style={{background:'#fce4ec',padding:12,borderRadius:8,marginBottom:14,textAlign:'left'}}>
            {errors.map((e,i) => <div key={i} style={{color:'#c62828',fontSize:'0.9rem'}}>&#x26A0;&#xFE0F; {e}</div>)}
          </div>
        )}
        <div style={{display:'flex',gap:12,justifyContent:'center',flexWrap:'wrap'}}>
          <button className="btn btn-primary btn-large" onClick={handleGenerate} disabled={generating || !apiKey}>
            {generating ? '⏳ 生成中...' : '🚀 開始生成'}
          </button>
          <button className="btn btn-secondary" onClick={() => setShowPromptModal(true)}>
            &#x1F4DD; 預覽 Prompt
          </button>
          {generating && (
            <button className="btn btn-danger" onClick={() => abortRef.current = true}>停止生成</button>
          )}
        </div>
      </div>

      {/* Progress */}
      {progress.length > 0 && (
        <div className="section">
          <h2>生成進度</h2>
          <div className="progress-list">
            {progress.map((p, i) => (
              <div key={i} className={`progress-item ${p.status}`}>
                <span>{p.status === 'done' ? '✅' : p.status === 'running' ? '⏳' : p.status === 'error' ? '❌' : '⏸'}</span>
                <span>{p.label}</span>
                {p.time && <span>— {p.time}</span>}
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Output */}
      {hasResults && (
        <div className="section">
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:12}}>
            <h2>生成結果</h2>
            <div style={{display:'flex',gap:8}}>
              <button className="btn btn-primary btn-small" onClick={handleDownloadZip}>
                &#x1F4E6; 全部下載 (ZIP)
              </button>
              <button className="btn btn-secondary btn-small" onClick={handleExportPrompts}>
                &#x1F4CB; 匯出 Prompt 清單
              </button>
            </div>
          </div>
          <div className="output-grid">
            {results.map(r => r.versions.length > 0 ? (
              <OutputCard key={r.sceneIndex} result={r}
                onRegenerate={handleRegenerate}
                onRevisionRegenerate={handleRevisionRegenerate}
                onSelectVersion={handleSelectVersion}
                onLightbox={setLightboxSrc}
                onInpaint={setInpaintSceneIdx}
                generating={generating} />
            ) : r.error ? (
              <div key={r.sceneIndex} className="output-card" style={{padding:20}}>
                <div style={{color:'#c62828',fontWeight:600}}>{String(r.sceneIndex+1).padStart(2,'0')} — {r.sceneName}</div>
                <div style={{color:'#c62828',margin:'10px 0'}}>&#x274C; {r.error}</div>
                <button className="btn btn-primary btn-small" onClick={() => handleRegenerate(r.sceneIndex)} disabled={generating}>
                  &#x1F504; 重試
                </button>
              </div>
            ) : null)}
          </div>
        </div>
      )}

      {/* Prompt preview modal */}
      {showPromptModal && (
        <div className="modal-overlay" onClick={() => setShowPromptModal(false)}>
          <div className="modal-content" onClick={e => e.stopPropagation()}>
            <button className="modal-close" onClick={() => setShowPromptModal(false)}>&#x2715;</button>
            <h2 style={{marginBottom:16}}>&#x1F4DD; Prompt 預覽</h2>
            {allPrompts.map((p, i) => (
              <div key={i} style={{marginBottom:20}}>
                <h3 style={{fontSize:'0.95rem',marginBottom:8}}>{p.label}</h3>
                <pre>{p.prompt}</pre>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Inpaint modal */}
      {inpaintSceneIdx !== null && (() => {
        const r = results.find(r => r.sceneIndex === inpaintSceneIdx);
        return r && r.versions.length > 0 ? (
          <InpaintModal
            result={r}
            onClose={() => setInpaintSceneIdx(null)}
            onSubmit={(srcVerNum, annotBase64, pct, patchDesc, origPrompt) =>
              handlePartialRegenerate(inpaintSceneIdx, srcVerNum, annotBase64, pct, patchDesc, origPrompt)}
            generating={generating}
          />
        ) : null;
      })()}

      {/* Lightbox */}
      {lightboxSrc && (
        <div className="lightbox-overlay" onClick={() => setLightboxSrc(null)}>
          <img src={lightboxSrc} alt="preview" />
        </div>
      )}

      <HistorySection
        sessions={history}
        onDelete={async (id) => { await histDelete(id); setHistory(prev => prev.filter(s => s.id !== id)); }}
      />

    </div>

    <footer className="app-footer">
      <NewsletterForm />

      <div className="footer-divider"></div>

      <div className="footer-label">Developed by</div>
      <div className="footer-dev-name">Keira Huang KK</div>

      <div className="footer-divider"></div>

      <div className="footer-contact">
        技術支援與回饋：<a href="mailto:chance5690@gmail.com.tw">chance5690@gmail.com.tw</a>
      </div>
      <div className="footer-disclaimer">
        （有問題通常是 AI 系統的暫時性問題，沒事不要亂寄信！）
      </div>

      <div style={{marginTop:20}}>
        <span className="version-badge">{APP_VERSION}</span>
      </div>
    </footer>
    </>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
